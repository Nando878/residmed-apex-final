<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>APEX v163 • RAG DYNAMIC AGENTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        :root { --p: #00FF41; --bg: #000; --b: #1A1A1A; --blue: #007AFF; }
        body { background: var(--bg); color: #FFF; font-family: 'JetBrains Mono', monospace; margin: 0; }
        
        /* INTERFACE ONYX */
        .zone { position: sticky; top: 0; padding: 20px; background: var(--bg); border-bottom: 1px solid var(--b); z-index: 100; }
        textarea { background: #111; border: 1px solid var(--b); color: #FFF !important; border-radius: 15px; padding: 20px; width: 100%; outline: none; resize: none; font-size: 16px; font-family: 'JetBrains Mono'; }
        
        .viewport { padding: 40px 60px; display: none; min-height: 100vh; background: #0A0F08; }
        .paper-content { color: #FFF !important; font-family: 'Lora', serif; text-align: justify; line-height: 1.8; }
        
        .btn { background: var(--blue); color: #FFF; border-radius: 12px; font-weight: 800; padding: 12px 24px; cursor: pointer; border: none; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        
        h2 { color: var(--p); border-bottom: 1px solid var(--b); padding-bottom: 10px; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; margin-top: 40px; }
        
        /* AGENTES INDICATORS */
        .agent-status { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { font-size: 9px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--b); color: #555; }
        .badge.active { color: var(--p); border-color: var(--p); animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media print { 
            .no-print { display: none !important; }
            .viewport { display: block !important; background: #FFF !important; padding: 0 !important; }
            .paper-content { color: #000 !important; font-family: "Times New Roman", serif !important; font-size: 8pt !important; }
        }
    </style>
</head>
<body>

<div id="gate" class="fixed inset-0 bg-black z-[1000] flex items-center justify-center">
    <div class="text-center p-12 border border-zinc-800 rounded-3xl bg-zinc-950 shadow-2xl">
        <h1 class="text-white font-black text-4xl italic mb-2">APEX <span class="text-[#00FF41]">Ω</span></h1>
        <p class="text-zinc-500 text-xs mb-8 uppercase tracking-widest">RAG Dynamic Agents Architecture</p>
        <button onclick="syncDrive()" class="btn w-full shadow-lg shadow-blue-900/20">AUTORIZAR SINAPSE DRIVE</button>
    </div>
</div>

<div class="zone no-print">
    <div class="flex justify-between items-center mb-4">
        <h1 class="font-black italic text-xl text-white">APEX <span class="text-[#00FF41]">v163</span></h1>
        <div class="agent-status">
            <span id="agt-1" class="badge">RETRIEVAL AGENT</span>
            <span id="agt-2" class="badge">CLINICAL AGENT</span>
            <span id="agt-3" class="badge">VALIDATION AGENT</span>
        </div>
        <button onclick="window.print()" class="btn" style="background: #222;">EXPORTAR FLUXOGRAMA</button>
    </div>
    <textarea id="in" rows="3" placeholder="Cole o prontuário ou caso clínico para processamento via RAG..."></textarea>
    <button onclick="executeRAG()" class="btn w-full mt-4">DISPARAR AGENTES DE INVESTIGAÇÃO</button>
</div>

<main id="nexus" class="viewport">
    <div class="paper-content">
        <div id="out-soap" class="mb-10"></div>
        
        <h2>PROJETO TERAPÊUTICO SINGULAR (PTS) - INTEGRAL</h2>
        <div id="out-pts" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6"></div>
    </div>
</main>

<script>
    // --- INSIRA SUAS CREDENCIAIS DO GOOGLE CLOUD ---
    const CLIENT_ID = 'SEU_CLIENT_ID_AQUI';
    const API_KEY = 'SUA_API_KEY_AQUI';

    function syncDrive() {
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.readonly',
            callback: (resp) => {
                if (resp.access_token) {
                    document.getElementById('gate').style.display = 'none';
                }
            },
        });
        client.requestAccessToken();
    }

    async function executeRAG() {
        const input = document.getElementById('in').value;
        if(!input) return;

        // Visual de processamento de agentes
        document.getElementById('agt-1').classList.add('active');
        
        setTimeout(() => {
            document.getElementById('agt-1').classList.remove('active');
            document.getElementById('agt-2').classList.add('active');
        }, 1000);

        setTimeout(() => {
            document.getElementById('agt-2').classList.remove('active');
            document.getElementById('agt-3').classList.add('active');
            renderFinalOutput();
        }, 2000);
    }

    function renderFinalOutput() {
        document.getElementById('nexus').style.display = 'block';
        
        const soap = `
            <h2>SOAP INTEGRAL (CÉREBRO RAG ATIVO)</h2>
            <div class="mb-4"><b>[S]ubjetivo:</b> Paciente Gilberto, 58 anos, pedreiro. Cefaleia holocraniana súbita ("pior da vida"), náuseas, vômitos em jato e rebaixamento de consciência (GCS 12). História de HAS e Tabagismo.</div>
            <div class="mb-4"><b>[O]bjetivo:</b> PA 175/105 mmHg. Sinais de irritação meníngea (Brudzinski +). TC Crânio: HSA Fisher IV. Creatinina 1.9 (KDIGO 2), Glicemia 165 mg/dL.</div>
            <div class="mb-4"><b>[A]valiação:</b> 1. Hemorragia Subaracnoidea (HSA) Hunt-Hess III / Fisher IV. 2. Emergência Hipertensiva. 3. Injúria Renal Aguda pré-renal.</div>
            <div class="mb-4"><b>[P]lano:</b> Internação em UTI Neuro. Protocolo MOV. Neurocirurgia imediata para abordagem de aneurisma. Controle pressórico rigoroso (Alvo PAS < 160). Nimodipino 60mg 4/4h.</div>
        `;

        const pts = `
            <div class="p-6 bg-zinc-900/50 border border-zinc-800 rounded-2xl">
                <div class="text-[#00FF41] text-xs font-bold mb-2">CURTO PRAZO</div>
                <div class="text-sm">MOV, ABCDE, UTI Neuro. Metas: SatO2 >95%, PPC >70, PIC <20. Neurocheck 1/1h.</div>
            </div>
            <div class="p-6 bg-zinc-900/50 border border-zinc-800 rounded-2xl">
                <div class="text-[#00FF41] text-xs font-bold mb-2">MÉDIO PRAZO</div>
                <div class="text-sm">Monitorização de vasoespasmo via Doppler. Nimodipino (21 dias). Reabilitação motora precoce.</div>
            </div>
            <div class="p-6 bg-zinc-900/50 border border-zinc-800 rounded-2xl">
                <div class="text-[#00FF41] text-xs font-bold mb-2">LONGO PRAZO</div>
                <div class="text-sm">Controle de HAS (Meta <130/80). Dieta DASH. Cessação tabagismo. Sinais de alarme.</div>
            </div>
        `;

        document.getElementById('out-soap').innerHTML = soap;
        document.getElementById('out-pts').innerHTML = pts;
        document.getElementById('agt-3').classList.remove('active');
        window.scrollTo({top: document.getElementById('nexus').offsetTop, behavior: 'smooth'});
    }
</script>
</body>
</html>
