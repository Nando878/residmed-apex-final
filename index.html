<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>APEX v170.1 • VANGUARD COMMANDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        :root { --p: #00FF41; --bg: #000; --b: #1A1A1A; --blue: #007AFF; --militar: #FF0000; }
        body { background: var(--bg); color: #FFF; font-family: 'JetBrains Mono', monospace; margin: 0; transition: 0.5s; }
        body.mode-military { background: #050505; --p: #FF0000; }
        .zone { position: sticky; top: 0; padding: 20px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--b); z-index: 100; backdrop-filter: blur(10px); }
        textarea { background: #111; border: 1px solid var(--b); color: var(--p) !important; border-radius: 12px; padding: 20px; width: 100%; outline: none; resize: none; font-size: 16px; transition: 0.3s; }
        textarea:focus { border-color: var(--p); box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }
        .viewport { padding: 40px 60px; display: none; min-height: 100vh; }
        .paper-content { color: #FFF; font-family: 'Lora', serif; text-align: justify; line-height: 1.8; }
        .mode-selector { display: flex; gap: 10px; background: #111; padding: 5px; border-radius: 10px; border: 1px solid #333; }
        .mode-btn { padding: 6px 12px; font-size: 9px; border-radius: 6px; cursor: pointer; font-weight: bold; opacity: 0.4; transition: 0.3s; }
        .mode-btn.active { opacity: 1; background: #222; color: var(--p); border: 1px solid var(--p); }
        h2 { color: var(--p); border-bottom: 1px solid var(--b); padding-bottom: 10px; text-transform: uppercase; font-size: 11px; letter-spacing: 3px; margin-top: 50px; }
        #loading { display: none; color: var(--p); font-size: 10px; margin-top: 10px; text-align: center; letter-spacing: 2px; }
        @media print { .no-print { display: none !important; } .viewport { display: block !important; background: #FFF !important; padding: 0 !important; } .paper-content { color: #000 !important; font-family: "Times New Roman", serif !important; font-size: 9pt !important; } h2 { color: #000 !important; border-bottom: 1pt solid #000 !important; } }
    </style>
</head>
<body id="master-body">

<div class="zone no-print">
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-4">
            <h1 class="font-black italic text-xl text-white uppercase">Apex <span class="text-[#00FF41]">v170.1</span></h1>
            <div class="mode-selector">
                <div id="btn-aca" class="mode-btn active" onclick="setMode('academic')">ACADÊMICO</div>
                <div id="btn-mil" class="mode-btn" onclick="setMode('military')">VANGUARD</div>
            </div>
        </div>
        <div class="text-[9px] text-zinc-600 uppercase tracking-widest">Cérebro: Gemini 1.5 PRO Online</div>
    </div>
    
    <textarea id="in" rows="3" placeholder="Insira o caso clínico aqui... [ENTER PARA EXECUTAR]" onkeydown="handleKey(event)"></textarea>
    <div id="loading" class="animate-pulse">AGENTE DE INTELIGÊNCIA EM OPERAÇÃO...</div>
</div>

<main id="nexus" class="viewport">
    <div class="paper-content" id="dynamic-output"></div>
</main>

<script>
    // CHAVE INJETADA PELO GEMINI
    const GEMINI_API_KEY = 'AIzaSyBCWOXSosudmIfZ4qDsWK-8Ze7EbqnfZNQ';

    let currentMode = 'academic';

    function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            processAI();
        }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-aca').className = (m === 'academic') ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-mil').className = (m === 'military') ? 'mode-btn active' : 'mode-btn';
        document.getElementById('master-body').className = (m === 'military') ? 'mode-military' : '';
    }

    async function processAI() {
        const input = document.getElementById('in').value;
        if (!input) return;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('nexus').style.display = 'none';
        
        const systemPrompt = `Você é um médico sênior e estrategista militar.
        Analise o caso clínico abaixo e gere:
        1. Um SOAP INTEGRAL conforme Semiologia HCFMUSP.
        2. Um PTS de 3 Fases (Curto, Médio e Longo Prazo).
        Se o MODO for MILITARY, use protocolo MARCH e tom autoritário Vanguard.
        Se o MODO for ACADEMIC, use rigor científico HCFMUSP.
        Cruze com diretrizes médicas de 2026.
        MODO ATUAL: ${currentMode.toUpperCase()}.
        CASO DO PACIENTE: ${input}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
            });

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text;
            render(rawText);
        } catch (err) {
            alert("Erro na sinapse: Verifique sua conexão ou limite da chave.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function render(text) {
        document.getElementById('nexus').style.display = 'block';
        // Converte Markdown básico da IA em HTML
        const formatted = text
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/### (.*?)(<br>|$)/g, '<h2>$1</h2>');
        
        document.getElementById('dynamic-output').innerHTML = `
            <div class="text-sm">${formatted}</div>
        `;
        window.scrollTo({top: 0, behavior: 'smooth'});
        document.getElementById('in').blur();
    }
</script>
</body>
</html>
