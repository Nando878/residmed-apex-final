<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v147 • PROTOCOL INTEGRATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root { 
            --mil-phosphor: #00FF41; 
            --mil-bg: #000000; 
            --mil-olive: #0A0F08;
            --mil-border: #1A1A1A;
            --ios-blue: #007AFF;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; background-color: var(--mil-bg); 
            color: var(--mil-phosphor); margin: 0; padding: 0;
            overflow-x: hidden; width: 100vw; display: flex; flex-direction: column;
        }

        .command-zone {
            flex: none; padding: 15px 20px; background: var(--mil-bg);
            border-bottom: 1px solid var(--mil-border); z-index: 10;
        }

        textarea { 
            background: #111; border: 1px solid var(--mil-border); 
            color: #FFF; border-radius: 12px; padding: 15px; font-size: 15px; 
            width: 100%; outline: none; resize: none;
        }

        .tactical-viewport { 
            flex: 1; width: 100%; background-color: var(--mil-olive); 
            padding: 30px; box-sizing: border-box; display: none;
        }

        .soap-content { text-align: justify; line-height: 1.6; font-family: 'Lora', serif; color: #EEE; }

        .ios-btn { 
            background-color: var(--ios-blue); color: #FFF; border-radius: 10px; 
            font-weight: 800; padding: 10px 18px; text-transform: uppercase;
            font-size: 10px; border: none; cursor: pointer; transition: 0.2s;
        }
        .ios-btn:active { transform: scale(0.95); }

        /* -------------------------------------------------------------------------- */
        /* CONFIGURAÇÃO DE IMPRESSÃO - FLUXOGRAMA TIMES NEW ROMAN 8PT                */
        /* -------------------------------------------------------------------------- */
        @media print {
            @page { size: A4 portrait; margin: 5mm; }
            body { background: #FFF !important; color: #000 !important; }
            .no-print { display: none !important; }
            .tactical-viewport { display: block !important; background: #FFF !important; padding: 0 !important; width: 100% !important; }
            
            #screen-view { display: none !important; }
            
            .flowchart-mode {
                display: block !important;
                font-family: "Times New Roman", Times, serif !important;
                font-size: 8pt !important;
                width: 100% !important;
            }
            
            .flow-box {
                border: 0.5pt solid #000;
                padding: 8px;
                margin-bottom: 8px;
                width: 100%;
                page-break-inside: avoid;
            }

            .flow-header { font-weight: bold; text-transform: uppercase; border-bottom: 0.5pt solid #000; margin-bottom: 5px; font-size: 9pt; }
            
            .grid-pts { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
            .col-pts { border: 0.3pt solid #333; padding: 5px; }
        }

        #flowchart-data { display: none; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="bg-[#0A0F08] p-10 rounded-2xl border border-[#333] text-center">
            <div class="text-white font-black text-2xl mb-6 italic">APEX Ω</div>
            <input type="password" id="pass" class="w-full p-3 bg-black rounded-lg text-center font-bold mb-6 text-[#00FF41] outline-none border border-[#333]">
            <button onclick="unlock()" class="ios-btn w-full">AUTORIZAR ACESSO</button>
        </div>
    </div>

    <div class="command-zone no-print">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-lg uppercase text-white tracking-tighter">Apex <span class="text-[#00FF41]">v147</span></h1>
            <div class="flex gap-2">
                <button onclick="window.print()" class="ios-btn" style="background: #222;">IMPRIMIR FLUXOGRAMA</button>
                <button onclick="solveProtocol()" class="ios-btn">EXECUTAR PROTOCOLO</button>
            </div>
        </div>
        <textarea id="clin-in" rows="3" placeholder="Insira o caso clínico para análise sênior..."></textarea>
    </div>

    <main id="nexus" class="hidden tactical-viewport">
        <div id="screen-view" class="soap-content">
            <div id="soap-out"></div>
        </div>

        <div id="flowchart-data" class="flowchart-mode">
            <div class="flow-box">
                <div class="flow-header">Identificação e Perfil</div>
                <div id="f-id"></div>
            </div>

            <div class="flow-box">
                <div class="flow-header">1. Curto Prazo (Estabilização e Metas Terapêuticas)</div>
                <div id="f-curto"></div>
            </div>

            <div class="flow-box">
                <div class="flow-header">2. Abordagem Farmacológica Hospitalar</div>
                <div id="f-farma"></div>
            </div>

            <div class="grid-pts">
                <div class="col-pts">
                    <div class="flow-header">3. Médio Prazo (Manejo e Reabilitação)</div>
                    <div id="f-medio"></div>
                </div>
                <div class="col-pts">
                    <div class="flow-header">4. Longo Prazo e Prevenção Secundária</div>
                    <div id="f-longo"></div>
                </div>
            </div>

            <div class="flow-box" style="margin-top: 10px; border: 1pt solid #000;">
                <div class="flow-header" style="color: red;">Sinais de Alarme e Orientações de Alta</div>
                <div id="f-alarme"></div>
            </div>
        </div>
    </main>

    <script>
        const KEY = "7400";
        function unlock() {
            if(document.getElementById('pass').value === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
            } else { alert("ACESSO NEGADO"); }
        }

        function solveProtocol() {
            const input = document.getElementById('clin-in').value;
            if(!input) return;

            document.getElementById('nexus').style.display = 'block';

            // DADOS ESTRUTURADOS CONFORME PROTOCOLO GILBERTO/HSA
            const id = "<b>Paciente:</b> Gilberto, 58 anos. <b>Perfil:</b> Classe C, Pedreiro. <b>Quadro:</b> HSA (Ruptura de Aneurisma).";
            
            const curto = `• <b>Protocolo MOV:</b> Monitorização, Oxigênio, Venoso.<br>
                           • <b>Metas:</b> SatO2 >95%, Glicemia 140-180, PIC <20, PPC >70.<br>
                           • <b>PA:</b> PAS <140 (Pré-op) | PAS <160 (Pós-op).<br>
                           • <b>Neurocheck:</b> 1/1h em UTI. Cabeceira 30°.`;

            const farma = `• <b>Nimodipino:</b> 60mg 4/4h por 21 dias.<br>
                           • <b>Levetiracetam:</b> Ataque 20mg/kg; Manutenção 1g 12/12h.<br>
                           • <b>Analgesia:</b> Tramadol 100mg EV 6/6h. <br>
                           • <b>Controle PA:</b> Nitroprussiato de Sódio em BIC.`;

            const medio = `• Monitorar vasoespasmo (Déficit focal/Rebaixamento).<br>
                           • Suporte Hemodinâmico: Noradrenalina (Meta PAS 160-180 se vasoespasmo).<br>
                           • Reabilitação Precoce (Fisio/Fono).`;

            const longo = `• <b>Meta PA:</b> <130/80 mmHg (Losartana 50mg + HCTZ 12,5mg).<br>
                           • <b>Estilo de Vida:</b> DASH, Sal <5g, Atividade >150 min/sem. Cessar tabagismo.`;

            const alarme = "Cefaleia intensa, novo déficit neurológico, convulsão, febre ou queda do estado geral.";

            // Preenchimento de Tela
            document.getElementById('soap-out').innerHTML = `
                <h2 style="color:#00FF41">SOAP & PTS INTEGRADO</h2>
                ${id}<br><br>
                ${curto}<br><br>
                ${farma}
            `;

            // Preenchimento de Fluxograma (Impressão)
            document.getElementById('f-id').innerHTML = id;
            document.getElementById('f-curto').innerHTML = curto;
            document.getElementById('f-farma').innerHTML = farma;
            document.getElementById('f-medio').innerHTML = medio;
            document.getElementById('f-longo').innerHTML = longo;
            document.getElementById('f-alarme').innerHTML = alarme;
        }
    </script>
</body>
</html>
