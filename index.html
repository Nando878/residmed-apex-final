<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v75.0 • CORE SOBERANIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&display=swap');
        
        :root { --p-blue: #007AFF; --p-red: #FF3B30; --p-zinc: #1c1c1e; }
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #FFF; overflow: hidden; height: 100vh;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }

        .scan-line {
            width: 100%; height: 2px;
            background: var(--p-blue);
            position: absolute; top: 0;
            animation: scan 3s infinite linear;
            box-shadow: 0 0 15px var(--p-blue);
            z-index: 10;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .pulse { animation: pulse-shadow 2s infinite ease-in-out; }
        @keyframes pulse-shadow { 
            0%, 100% { box-shadow: 0 0 20px rgba(0, 122, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 122, 255, 0.4); }
        }

        input, textarea { 
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--p-blue) !important; transform: scale(1.02); }

        #gate { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 flex flex-col">

    <div id="gate">
        <div class="glass p-10 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-24 h-24 bg-white text-black rounded-[40px] flex items-center justify-center font-black text-5xl mx-auto mb-8 italic shadow-2xl">Ω</div>
            <h2 class="text-[10px] font-black uppercase tracking-[0.5em] mb-10 text-zinc-500">System Gate v75.0</h2>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="ADMIN ID" class="w-full p-5 rounded-3xl text-center font-bold text-white outline-none">
                <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-5 rounded-3xl text-center font-bold text-white outline-none">
                <button onclick="auth()" class="w-full bg-blue-600 py-6 rounded-[35px] font-black text-[12px] uppercase tracking-widest pulse">Despertar Core</button>
            </div>
        </div>
    </div>

    <main id="nexus" class="hidden flex flex-col h-full space-y-4 max-w-2xl mx-auto w-full pt-10">
        <header class="flex justify-between items-end px-2">
            <div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                    <h1 class="font-black italic text-2xl tracking-tighter uppercase">Apex <span class="text-blue-500">v75</span></h1>
                </div>
                <p id="loc" class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-1">Status: Sincronizando Palmas-TO</p>
            </div>
            <div class="text-right">
                <div class="text-[8px] font-black text-green-500 tracking-widest uppercase italic">Bio-Lógica: 100%</div>
                <div class="text-[10px] font-light text-zinc-600 italic">2026 Sovereign Protocol</div>
            </div>
        </header>

        <section class="glass p-6 space-y-6 flex-1 relative overflow-hidden">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[7px] font-black text-zinc-500 uppercase ml-4">Idade</label>
                    <input type="number" id="age" placeholder="--" class="w-full p-5 rounded-[25px] text-center font-black text-xl">
                </div>
                <div class="space-y-1">
                    <label class="text-[7px] font-black text-zinc-500 uppercase ml-4">Peso (kg)</label>
                    <input type="number" id="weight" placeholder="--" class="w-full p-5 rounded-[25px] text-center font-black text-xl">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[7px] font-black text-zinc-500 uppercase ml-4">Caso Clínico / Input Cognitivo</label>
                <textarea id="clin-in" class="w-full p-6 rounded-[35px] text-sm h-40 outline-none resize-none" placeholder="Aguardando dados..."></textarea>
            </div>

            <div class="flex gap-3">
                <button onclick="startVoice()" class="flex-1 glass py-4 rounded-2xl text-[9px] font-black uppercase text-blue-400">🎤 Voz</button>
                <button onclick="biometricScan()" class="flex-1 glass py-4 rounded-2xl text-[9px] font-black uppercase text-zinc-500">🔍 Scan</button>
            </div>

            <button onclick="runApex()" class="w-full bg-white text-black py-6 rounded-[40px] font-black text-[12px] uppercase tracking-[0.3em] active:scale-95 transition-all shadow-white/10 shadow-2xl">Processar Cognição</button>
        </section>

        <div id="out" class="hidden glass p-8 text-sm leading-relaxed text-blue-100 italic font-light"></div>
    </main>

    <script>
        const MASTER_ID = "APEX-ADMIN";
        const MASTER_KEY = "PALMAS-2026";

        function auth() {
            if(document.getElementById('user').value.trim() === MASTER_ID && document.getElementById('pass').value.trim() === MASTER_KEY) {
                document.getElementById('gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('nexus').classList.remove('hidden');
                    speak("Protocolo Palmas Core v75 ativado. Soberania tecnológica confirmada.");
                }, 500);
            } else { alert("ACESSO NEGADO."); }
        }

        function runApex() {
            const age = document.getElementById('age').value;
            const history = document.getElementById('clin-in').value;
            let output = "[ANALISE APEX] ";
            
            if(history.toLowerCase().includes("dor")) output += "Padrão álgico detectado. Priorizar estabilização. ";
            if(age < 12) output += "Protocolo Pediátrico Nelson Ativo. ";
            
            const el = document.getElementById('out');
            el.innerText = output + " Análise processada no Core Local de Palmas.";
            el.classList.remove('hidden');
            speak(el.innerText);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 0.9; m.pitch = 0.8;
            window.speechSynthesis.speak(m);
        }

        function startVoice() { 
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { document.getElementById('clin-in').value = e.results[0][0].transcript; runApex(); };
            r.start();
            speak("Escuta tática ativada.");
        }
    </script>
</body>
</html>
