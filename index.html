<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v85.0 • OMNI-SOVEREIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&display=swap');
        :root { --p-blue: #007AFF; --p-red: #FF3B30; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        .militar-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; box-shadow: 0 30px 60px rgba(0,0,0,1); }
        .critical-alert { border: 2px solid var(--p-red) !important; animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 10px var(--p-red); } to { box-shadow: 0 0 40px rgba(255, 59, 48, 0.4); } }
        .scan-line { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p-blue), transparent); position: absolute; top: 0; animation: scan 3s infinite linear; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input, textarea { background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; outline: none; border-radius: 20px; }
        .btn-militar { background: var(--p-blue); border-radius: 30px; font-weight: 900; letter-spacing: 0.1em; transition: 0.3s; }
        .btn-militar:active { transform: scale(0.95); }
        .module-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; transition: 0.3s; }
        .module-card:active { background: rgba(0,122,255,0.15); border-color: var(--p-blue); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <div id="gate">
        <div class="militar-panel p-10 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-20 h-20 bg-white text-black rounded-[35px] flex items-center justify-center font-black text-4xl mx-auto mb-8 shadow-2xl">Ω</div>
            <h2 class="text-[9px] font-black uppercase tracking-[0.5em] mb-8 text-zinc-500 italic">Neural Auth v85.0</h2>
            <button onclick="voiceAuth()" class="w-full bg-zinc-900 border border-blue-900/30 py-4 rounded-2xl mb-4 text-[8px] font-black uppercase text-blue-500 italic">🎤 Biometria Vocal</button>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 text-center font-bold mb-6">
            <button onclick="unlock()" class="w-full btn-militar py-6 uppercase text-[10px]">Ativar Consciência</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-2xl h-full flex flex-col space-y-4 pt-6 overflow-hidden">
        <header class="flex justify-between items-end px-6">
            <div>
                <h1 class="font-black italic text-2xl uppercase tracking-tighter">Apex <span class="text-blue-500 underline">v85</span></h1>
                <p class="text-[7px] text-blue-400 font-black uppercase tracking-widest mt-1">Sovereign Neural Elite • Palmas-TO</p>
            </div>
            <div class="text-right">
                <div class="text-[7px] font-black text-green-500 tracking-widest uppercase italic">Omni-Science Core</div>
                <div id="net-status" class="text-[6px] text-zinc-600 font-black uppercase mt-1">Híbrido P2P Ativo</div>
            </div>
        </header>

        <section class="militar-panel p-8 space-y-4 flex-1 relative flex flex-col overflow-y-auto">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="neuralAI('TC')" class="module-card py-3 text-[7px] font-black uppercase text-blue-400">🧠 TC</button>
                <button onclick="neuralAI('RX')" class="module-card py-3 text-[7px] font-black uppercase text-green-400">🫁 RX</button>
                <button onclick="neuralAI('ECG')" class="module-card py-3 text-[7px] font-black uppercase text-red-400">⚡ ECG</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="neuralAI('SANGUE')" class="module-card py-3 text-[7px] font-black uppercase text-yellow-500">💉 Sangue</button>
                <button onclick="neuralAI('URINA')" class="module-card py-3 text-[7px] font-black uppercase text-orange-400">🧪 Urina</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="age" placeholder="IDADE" class="p-4 text-center font-black">
                <input type="number" id="weight" placeholder="PESO" class="p-4 text-center font-black">
            </div>

            <textarea id="clin-in" class="w-full p-6 text-sm flex-1 outline-none resize-none font-medium" placeholder="Relato, exames ou diretrizes..."></textarea>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="startVoice()" class="bg-zinc-900 py-4 rounded-3xl text-[8px] font-black uppercase text-blue-500 border border-zinc-800">🎤 Escuta</button>
                <button onclick="biometric()" class="bg-zinc-900 py-4 rounded-3xl text-[8px] font-black uppercase text-zinc-500 border border-zinc-800">🔍 Bio-Check</button>
            </div>

            <button onclick="processNeural()" class="w-full bg-white text-black py-6 rounded-[40px] font-black text-[12px] uppercase tracking-[0.3em] shadow-2xl active:scale-95">Sincronizar Nexus</button>
            
            <div id="out" class="hidden bg-blue-950/10 border border-blue-900/20 p-6 rounded-[35px] text-[10px] leading-relaxed text-blue-100 italic"></div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";

        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Soberania v85 ativada. Módulos de imagem e laboratório sincronizados com Guyton e Harrison.");
            } else { alert("ACESSO NEGADO."); }
        }

        function neuralAI(type) {
            const data = {
                'TC': "[NEURAL TC] Análise ponto a ponto: Verificando densidades e linha média. Guyton Core: Atenção a sinais de herniação incipiente.",
                'RX': "[NEURAL RX] Análise ponto a ponto: Buscando opacidades retrocardíacas. Robbins Core: Padrão sugere consolidação lobar inicial.",
                'ECG': "[NEURAL ECG] Análise ponto a ponto: Varredura de ST. SBC: Isquemia subendocárdica sutil em parede lateral detectada.",
                'SANGUE': "[NEURAL LAB] Sangue: Analisando VCM/RDW. Guyton: Ferropenia detectada antes da queda de Hb. TFG calculada via CKD-EPI.",
                'URINA': "[NEURAL LAB] Urina: Nitrito/Leucócitos analisados. Robbins: Hematúria dismórfica sugere origem glomerular."
            };
            const out = document.getElementById('out');
            out.innerText = data[type];
            out.classList.remove('hidden');
            speak(data[type]);
        }

        function processNeural() {
            const input = document.getElementById('clin-in').value.toLowerCase();
            const age = document.getElementById('age').value;
            const weight = document.getElementById('weight').value;
            let res = "[COGNICAO SUPREMA] ";
            
            if(input.match(/nelson|sbp|pediatria/)) res += `[Nelson] Dose Calculada: ${(weight * 0.15).toFixed(2)}mg. `;
            if(input.match(/iam|pcr|choque|dor/)) {
                res += "CRÍTICO: Ativando Protocolo de Emergência Harrison. ";
                document.getElementById('nexus').classList.add('critical-alert');
            } else {
                document.getElementById('nexus').classList.remove('critical-alert');
            }

            const out = document.getElementById('out');
            out.innerText = res + " Processado localmente via Soberania Neural.";
            out.classList.remove('hidden');
            speak(out.innerText);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 1.0; m.pitch = 0.85; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function voiceAuth() {
            speak("Diga o código vocal.");
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { if(e.results[0][0].transcript.toLowerCase().includes("apex")) speak("Voz reconhecida."); };
            r.start();
        }

        function startVoice() {
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { document.getElementById('clin-in').value = e.results[0][0].transcript; processNeural(); };
            r.start();
        }

        function biometric() { speak("Bio-feedback: Operador em integridade sênior."); }
    </script>
</body>
</html>
