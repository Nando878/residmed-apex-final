<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v146 • FLOWCHART ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root { 
            --mil-phosphor: #00FF41; 
            --mil-bg: #000000; 
            --mil-olive: #0A0F08;
            --mil-border: #1A1A1A;
            --ios-blue: #007AFF;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; background-color: var(--mil-bg); 
            color: var(--mil-phosphor); margin: 0; padding: 0;
            overflow-x: hidden; width: 100vw; display: flex; flex-direction: column;
        }

        /* ÁREA DE INPUT COMPACTA */
        .command-zone {
            flex: none; padding: 20px; background: var(--mil-bg);
            border-bottom: 1px solid var(--mil-border); z-index: 10;
        }

        textarea { 
            background: #111; border: 1px solid var(--mil-border); 
            color: #FFF; border-radius: 15px; padding: 20px; font-size: 16px; 
            width: 100%; outline: none; resize: none;
        }

        /* PAINEL DE EXIBIÇÃO EM TELA */
        .tactical-viewport { 
            flex: 1; width: 100%; background-color: var(--mil-olive); 
            padding: 40px; box-sizing: border-box; display: none;
        }

        .soap-content { text-align: justify; line-height: 1.6; font-family: 'Lora', serif; }

        /* ESTILO DOS BOTÕES */
        .ios-btn { 
            background-color: var(--ios-blue); color: #FFF; border-radius: 12px; 
            font-weight: 800; padding: 12px 20px; text-transform: uppercase;
            font-size: 10px; border: none; cursor: pointer;
        }

        /* ROLAGEM PTS */
        .pts-track { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; }
        .pts-box { min-width: 300px; background: rgba(255,255,255,0.03); padding: 20px; border: 1px solid var(--mil-border); border-radius: 15px; }

        /* -------------------------------------------------------------------------- */
        /* CONFIGURAÇÃO DO FLUXOGRAMA PARA IMPRESSÃO (A4) E TELA COMPLETA             */
        /* -------------------------------------------------------------------------- */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background: #FFF !important; color: #000 !important; }
            .no-print { display: none !important; }
            .tactical-viewport { display: block !important; background: #FFF !important; padding: 0 !important; }
            
            /* Transformação em Fluxograma */
            .soap-content, .pts-track { display: none !important; }
            
            .flowchart-mode {
                display: flex !important; flex-direction: column; gap: 10px;
                font-family: "Times New Roman", Times, serif !important;
                font-size: 8pt !important; width: 100%;
            }
            
            .flow-node {
                border: 1pt solid #000; padding: 10px; margin-bottom: 5px;
                text-align: center; position: relative; width: 100%;
            }
            
            .flow-node::after {
                content: "↓"; display: block; font-size: 12pt; margin-top: 5px;
            }
            .flow-node:last-child::after { content: ""; }
            
            .flow-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
            .flow-sub-node { border: 0.5pt solid #000; padding: 5px; }
        }

        #flowchart-data { display: none; } /* Invisível na tela normal */
        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="bg-[#0A0F08] p-12 rounded-3xl border border-[#333] text-center">
            <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.5em] mb-8 text-white">CHAVE: 7400</h2>
            <input type="password" id="pass" class="w-full p-4 bg-black rounded-xl text-center font-bold mb-8 text-[#00FF41] outline-none border border-[#333]">
            <button onclick="unlock()" class="ios-btn w-full">AUTORIZAR</button>
        </div>
    </div>

    <div class="command-zone no-print">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-xl uppercase text-white">Apex <span class="text-[#00FF41]">v146</span></h1>
            <div class="flex gap-2">
                <button onclick="window.print()" class="ios-btn" style="background: #222;">GERAR FLUXOGRAMA (A4)</button>
                <button onclick="solveArchitect()" class="ios-btn">EXECUTAR</button>
            </div>
        </div>
        <textarea id="clin-in" rows="3" placeholder="COLE O CASO AQUI..."></textarea>
    </div>

    <main id="nexus" class="hidden tactical-viewport">
        <div class="soap-content" id="screen-view">
            <h2 class="text-white uppercase font-bold text-xs mb-4">SÍNTESE CLÍNICA</h2>
            <div id="soap-out" class="text-white"></div>
        </div>

        <div id="flowchart-data" class="flowchart-mode">
            <div class="flow-node"><strong>ENTRADA (ANAMNESE):</strong><br><span id="flow-s"></span></div>
            <div class="flow-node"><strong>DADOS OBJETIVOS & EXAMES:</strong><br><span id="flow-o"></span></div>
            <div class="flow-node"><strong>HIPÓTESES DIAGNÓSTICAS (CARDIOPAPERS/USP):</strong><br><span id="flow-a"></span></div>
            <div class="flow-node"><strong>CONDUTA IMEDIATA & TERAPÊUTICA:</strong><br><span id="flow-p"></span></div>
            <div class="flow-node"><strong>PROJETO TERAPÊUTICO SINGULAR (PTS)</strong>
                <div class="flow-grid">
                    <div class="flow-sub-node"><strong>CURTO PRAZO:</strong><br><span id="flow-ptsc"></span></div>
                    <div class="flow-sub-node"><strong>MÉDIO PRAZO:</strong><br><span id="flow-ptsm"></span></div>
                    <div class="flow-sub-node"><strong>LONGO PRAZO:</strong><br><span id="flow-ptsl"></span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const KEY = "7400";
        function unlock() {
            if(document.getElementById('pass').value === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
            } else { alert("NEGADO"); }
        }

        function solveArchitect() {
            const input = document.getElementById('clin-in').value;
            if(!input) return;

            document.getElementById('nexus').style.display = 'block';
            
            // Simulação de Processamento Sênior
            const s = "Sr. Arlindo, 74 anos. Declínio funcional agudo (72h), inapetência e flutuação de consciência. Relato de sundowning. Antecedentes: HPB e Amitriptilina.";
            const o = "Desidratado, PA 110/60 mmHg. Bexigoma presente. Creatinina 1.9, Leucocitose 13.500, nitrito (+).";
            const a = "1. Delirium hipoativo (foco infeccioso urinário). 2. ITU complicada. 3. IRA KDIGO 2. 4. Iatrogenia (Beers): Amitriptilina.";
            const p = "Sondagem vesical imediata. Hidratação controlada NaCl 0,9%. Descontinuação imediata de Amitriptilina.";
            
            const ptsc = "Estabilização renal e Trial without catheter em 48h.";
            const ptsm = "Avaliação urológica (RTU) pós-estabilização.";
            const ptsl = "Avaliação geriátrica abrangente pós-delirium.";

            // Preenche visualização de tela
            document.getElementById('soap-out').innerHTML = `<b>S:</b> ${s}<br><br><b>O:</b> ${o}<br><br><b>A:</b> ${a}<br><br><b>P:</b> ${p}`;

            // Preenche dados para o Fluxograma (Impressão)
            document.getElementById('flow-s').innerText = s;
            document.getElementById('flow-o').innerText = o;
            document.getElementById('flow-a').innerText = a;
            document.getElementById('flow-p').innerText = p;
            document.getElementById('flow-ptsc').innerText = ptsc;
            document.getElementById('flow-ptsm').innerText = ptsm;
            document.getElementById('flow-ptsl').innerText = ptsl;
        }
    </script>
</body>
</html>
