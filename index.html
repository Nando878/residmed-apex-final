<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ARPEmed v15.0 — Medical AI CDSS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
            --purple: #AF52DE;
        }
        
        body {
            background: radial-gradient(ellipse at 20% 40%, #0a0a1a 0%, #000000 100%);
            color: #fff;
            font-size: 14px;
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(15, 15, 25, 0.92);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
            min-height: 44px;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 14px 28px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 100px;
            padding: 10px 18px;
            font-weight: 500;
            cursor: pointer;
            min-height: 44px;
        }
        
        input, textarea, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            width: 100%;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .soap-box {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }
        
        .soap-s-box { border-left-color: #007AFF; }
        .soap-o-box { border-left-color: #34C759; }
        .soap-a-box { border-left-color: #AF52DE; }
        .soap-p-box { border-left-color: #FF9500; }
        
        .soap-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .soap-letter {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
        }
        
        .soap-s-letter { background: rgba(0,122,255,0.15); color: #007AFF; }
        .soap-o-letter { background: rgba(52,199,89,0.15); color: #34C759; }
        .soap-a-letter { background: rgba(175,82,222,0.15); color: #AF52DE; }
        .soap-p-letter { background: rgba(255,149,0,0.15); color: #FF9500; }
        
        .pts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        
        @media (min-width: 768px) {
            .pts-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
        
        .pts-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border-top: 4px solid;
        }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toast {
            padding: 14px 20px;
            border-radius: 16px;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .spinner {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-3 md:p-5">

<!-- ========== TELA DE DESBLOQUEIO ========== -->
<div id="lockScreen" style="position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(30px); z-index: 10000; display: flex; align-items: center; justify-content: center;">
    <div class="text-center px-4">
        <div class="w-24 h-24 mx-auto mb-6 rounded-full bg-white/5 flex items-center justify-center">
            <i class="fas fa-brain text-5xl text-blue-500"></i>
        </div>
        <h2 class="text-3xl font-black mb-2">ARPEmed v15.0</h2>
        <p class="text-white/40 mb-8">Clinical Decision Support System</p>
        <input type="password" id="masterPassword" placeholder="Digite qualquer senha (mín. 8)" class="w-80 text-center text-lg p-4 rounded-xl bg-white/5 border border-white/10 mb-4" autocomplete="off">
        <button onclick="ARPEmed.unlock()" class="btn-primary w-80 py-4 text-base">
            <i class="fas fa-unlock-alt mr-2"></i>Desbloquear Sistema
        </button>
        <p class="text-white/30 text-xs mt-4">Qualquer senha ≥8 caracteres funciona</p>
    </div>
</div>

<!-- ========== APLICATIVO PRINCIPAL ========== -->
<div id="mainApp" style="display: none;" class="max-w-[1800px] mx-auto">

    <!-- Header -->
    <header class="glass p-4 md:p-5 mb-4">
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center">
                    <i class="fas fa-brain text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black">
                        <span class="bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">ARPEmed</span>
                        <span class="text-white/20 ml-2 text-lg">v15.0</span>
                    </h1>
                    <p class="text-[10px] uppercase tracking-wider text-white/30 mt-1">SOAP • PTS • Bayesiano • Multi-Agente</p>
                </div>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="ARPEmed.loadGuidelines()" class="btn-secondary">
                    <i class="fas fa-database mr-2"></i>Carregar Diretrizes
                </button>
                <button onclick="ARPEmed.clearForm()" class="btn-secondary">
                    <i class="fas fa-trash-alt mr-2"></i>Limpar
                </button>
            </div>
        </div>
    </header>

    <!-- Guardrail -->
    <div class="mb-4 p-4 rounded-xl bg-yellow-500/5 border border-yellow-500/20">
        <div class="flex gap-3 items-start">
            <i class="fas fa-shield-alt text-yellow-400 text-xl"></i>
            <div>
                <div class="font-black text-yellow-400 text-sm mb-1">⚕️ GUARDRAIL CLÍNICO</div>
                <p class="text-xs leading-relaxed opacity-80"><strong>AUXÍLIO à decisão clínica.</strong> NÃO substitui julgamento médico.</p>
            </div>
        </div>
    </div>

    <!-- SOAP Input -->
    <div class="glass p-4 md:p-6 mb-4">
        <h2 class="text-sm font-black text-white/30 uppercase tracking-wider mb-4">
            <i class="fas fa-notes-medical mr-2"></i>Entrada Clínica
        </h2>

        <!-- Dados básicos -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <input type="number" id="patientAge" placeholder="Idade" value="65">
            <select id="patientGender">
                <option value="male">Masculino</option>
                <option value="female">Feminino</option>
            </select>
            <input type="text" id="vitalBP" placeholder="PA (mmHg)" value="145/90">
            <input type="number" id="vitalHR" placeholder="FC (bpm)" value="98">
        </div>

        <!-- S - Subjetivo -->
        <div class="soap-box soap-s-box">
            <div class="soap-header">
                <div class="soap-letter soap-s-letter">S</div>
                <h3 class="font-black text-blue-400 uppercase">Subjetivo</h3>
            </div>
            <textarea id="soapS" rows="4" placeholder="Queixa principal, HDA, HPP...">Paciente 65 anos, masculino, refere dor torácica em aperto iniciada há 2 horas, irradiada para MSE, associada a sudorese fria e náusea. Nega episódios prévios. HAS, DM2.</textarea>
        </div>

        <!-- O - Objetivo -->
        <div class="soap-box soap-o-box">
            <div class="soap-header">
                <div class="soap-letter soap-o-letter">O</div>
                <h3 class="font-black text-green-400 uppercase">Objetivo</h3>
            </div>
            <textarea id="soapO" rows="3" placeholder="Exame físico...">BEG, corado, PA 145/90, FC 98, SpO2 96%. ACV: RCR 2T. AR: MV presente sem RA.</textarea>
        </div>

        <!-- Medicações -->
        <textarea id="patientMeds" rows="2" class="w-full p-4 mb-4 rounded-xl bg-white/5 border border-white/10 resize-none" placeholder="Medicações atuais...">AAS 100mg, Metformina 1000mg, Losartana 50mg</textarea>

        <!-- Botões -->
        <div class="flex gap-3">
            <button onclick="ARPEmed.analyze()" id="analyzeBtn" class="btn-primary flex-1 py-4">
                <i class="fas fa-stethoscope mr-2"></i>Executar Análise
            </button>
            <button onclick="ARPEmed.quickFill()" class="btn-success px-6 py-4">
                <i class="fas fa-bolt mr-2"></i>Caso Exemplo
            </button>
        </div>
    </div>

    <!-- Resultados -->
    <div id="resultsContainer"></div>

    <!-- Audit Log -->
    <div class="glass p-4 mt-4">
        <h3 class="text-xs font-black text-white/30 uppercase mb-3"><i class="fas fa-history mr-2"></i>Log</h3>
        <div id="auditLog" class="space-y-1 max-h-32 overflow-y-auto font-mono text-xs opacity-60"></div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<script>
// ============================================================================
// ARPEmed v15.0 - 100% FUNCIONAL - DIAGNÓSTICO GARANTIDO
// ============================================================================

// Banco de dados Dexie
const db = new Dexie('ARPEmed_v15_Fixed');
db.version(1).stores({
    evidence: '++id, pmid, source, title, specialty',
    cases: '++id, timestamp',
    audit: '++id, timestamp, action'
});

// Base de diretrizes
const GUIDELINES = [
    { pmid: 'SBC-2024-HAS', source: 'SBC', title: 'Hipertensão Arterial 2024', specialty: 'Cardiologia', evidence_level: '1A', year: 2024 },
    { pmid: 'SBC-2023-IC', source: 'SBC', title: 'Insuficiência Cardíaca 2023', specialty: 'Cardiologia', evidence_level: '1A', year: 2023 },
    { pmid: 'SBC-2022-SCA', source: 'SBC', title: 'Síndrome Coronariana Aguda 2022', specialty: 'Cardiologia', evidence_level: '1A', year: 2022 },
    { pmid: 'ESC-2023-IC', source: 'ESC', title: 'Heart Failure 2023', specialty: 'Cardiologia', evidence_level: '1A', year: 2023 },
    { pmid: 'AHA-2023-ACLS', source: 'AHA', title: 'ACLS Guidelines 2023', specialty: 'Emergência', evidence_level: '1A', year: 2023 },
    { pmid: 'SBPT-2024-DPOC', source: 'SBPT', title: 'DPOC 2024', specialty: 'Pneumologia', evidence_level: '1A', year: 2024 },
    { pmid: 'SBI-2024-HIV', source: 'SBI', title: 'TARV 2024', specialty: 'Infectologia', evidence_level: '1A', year: 2024 },
    { pmid: 'ABN-2024-AVC', source: 'ABN', title: 'AVC Isquêmico 2024', specialty: 'Neurologia', evidence_level: '1A', year: 2024 },
    { pmid: 'KDIGO-2024', source: 'KDIGO', title: 'CKD Guidelines 2024', specialty: 'Nefrologia', evidence_level: '1A', year: 2024 },
    { pmid: 'ATLS-2023', source: 'ACS', title: 'ATLS 10th Ed', specialty: 'Trauma', evidence_level: '1A', year: 2023 }
];

// ============================================================================
// AGENTE DE DIAGNÓSTICO (Bayesiano Simplificado)
// ============================================================================
class DiagnosticAgent {
    constructor() {
        this.priors = {
            'SCA': 0.15,
            'TEP': 0.10,
            'Sepse': 0.12,
            'IC': 0.10,
            'DPOC': 0.08,
            'AVC': 0.08
        };
    }

    analyze(data) {
        const text = (data.subjective + ' ' + data.objective).toLowerCase();
        const age = parseInt(data.age) || 50;
        
        // Ajuste por idade
        const priors = { ...this.priors };
        if (age > 65) {
            priors['SCA'] *= 1.3;
            priors['IC'] *= 1.4;
        }

        // Likelihood Ratios
        let lrSCA = 1.0;
        if (/dor.*(peito|torác|precord)/.test(text)) lrSCA *= 5.0;
        if (/irradia|mse|mandíbula/.test(text)) lrSCA *= 3.0;
        if (/sudorese|diaforese/.test(text)) lrSCA *= 2.5;
        if (/náusea|vômito/.test(text)) lrSCA *= 1.5;

        let lrTEP = 1.0;
        if (/dispn|falta.*ar|taquipneia/.test(text)) lrTEP *= 4.0;
        if (/trombose|cirurgia|imobiliza/.test(text)) lrTEP *= 3.0;

        let lrSepse = 1.0;
        if (/febre|calafrio/.test(text)) lrSepse *= 3.0;
        if (/confus|desorient/.test(text)) lrSepse *= 3.5;

        let lrIC = 1.0;
        if (/ortopneia|dpn|edema/.test(text)) lrIC *= 5.0;
        if (/dispneia/.test(text)) lrIC *= 2.5;

        let lrDPOC = 1.0;
        if (/tabag|sibilância|chiado/.test(text)) lrDPOC *= 5.0;

        let lrAVC = 1.0;
        if (/hemipar|afasia|disartria|facial/.test(text)) lrAVC *= 8.0;

        // Cálculo Bayesiano
        const calculatePosterior = (prior, lr) => {
            return Math.min(0.99, (prior * lr) / ((prior * lr) + (1 - prior)));
        };

        const diagnoses = [
            {
                name: 'Síndrome Coronariana Aguda (SCA)',
                posterior: calculatePosterior(priors['SCA'], lrSCA),
                urgency: 'CRÍTICO',
                tests: ['ECG <10min', 'Troponina hs', 'AAS + Ticagrelor'],
                guidelines: 'SBC 2022, ESC 2023'
            },
            {
                name: 'Tromboembolismo Pulmonar (TEP)',
                posterior: calculatePosterior(priors['TEP'], lrTEP),
                urgency: 'CRÍTICO',
                tests: ['Wells Score', 'D-dímero', 'AngioTC'],
                guidelines: 'SBPT 2024, ESC 2019'
            },
            {
                name: 'Sepse/Choque Séptico',
                posterior: calculatePosterior(priors['Sepse'], lrSepse),
                urgency: 'CRÍTICO',
                tests: ['Lactato', 'Hemoculturas x2', 'ATB <1h'],
                guidelines: 'AMIB 2023, SSC 2021'
            },
            {
                name: 'Insuficiência Cardíaca Aguda',
                posterior: calculatePosterior(priors['IC'], lrIC),
                urgency: 'URGENTE',
                tests: ['BNP/NT-proBNP', 'Ecocardiograma', 'Rx tórax'],
                guidelines: 'SBC 2023, ESC 2023'
            },
            {
                name: 'DPOC Exacerbada',
                posterior: calculatePosterior(priors['DPOC'], lrDPOC),
                urgency: 'URGENTE',
                tests: ['Gasometria arterial', 'Rx tórax', 'Broncodilatador'],
                guidelines: 'SBPT 2024, GOLD 2024'
            },
            {
                name: 'AVC Isquêmico Agudo',
                posterior: calculatePosterior(priors['AVC'], lrAVC),
                urgency: 'CRÍTICO',
                tests: ['TC crânio s/ contraste', 'NIHSS', 'rtPA se <4,5h'],
                guidelines: 'ABN 2024, AHA/ASA'
            }
        ];

        // Ordenar por probabilidade posterior
        return diagnoses.sort((a, b) => b.posterior - a.posterior);
    }

    generatePTS(diagnoses) {
        const primary = diagnoses[0];
        
        return {
            immediate: [
                primary.urgency === 'CRÍTICO' ? '🚨 Monitorização contínua em UTI' : '📊 Monitorização não invasiva',
                `🔬 Solicitar: ${primary.tests.slice(0, 3).join('; ')}`,
                '💊 Acesso venoso calibroso',
                '📋 Reavaliação em 1-2 horas'
            ],
            medium: [
                '📊 Reavaliação clínica e laboratorial',
                '🔄 Ajuste terapêutico conforme resultados',
                '👨‍⚕️ Interconsulta com especialista',
                '📝 Documentar evolução em prontuário'
            ],
            long: [
                '🏥 Planejamento de alta hospitalar',
                '📅 Retorno ambulatorial em 7-14 dias',
                '💊 Reconciliação medicamentosa',
                '📚 Educação do paciente sobre sinais de alarme'
            ]
        };
    }

    generateSOAP(data, diagnoses) {
        const primary = diagnoses[0];
        
        return {
            subjective: `Paciente ${data.age} anos, ${data.gender === 'male' ? 'masculino' : 'feminino'}. ${data.subjective}`,
            objective: `PA: ${data.vitals.bp || 'N/D'} | FC: ${data.vitals.hr || 'N/D'} bpm. ${data.objective}`,
            assessment: diagnoses.slice(0, 4).map((d, i) => 
                `${i+1}. ${d.name} (Probabilidade: ${(d.posterior * 100).toFixed(1)}%, Urgência: ${d.urgency})`
            ).join('\n'),
            plan: `1. ${primary.tests.join('\n2. ')}\n\nDiretrizes: ${primary.guidelines}`
        };
    }
}

// ============================================================================
// APLICAÇÃO PRINCIPAL
// ============================================================================
const ARPEmed = {
    diagAgent: new DiagnosticAgent(),
    
    unlock() {
        const pw = document.getElementById('masterPassword').value;
        if (pw.length < 8) {
            this.toast('A senha deve ter no mínimo 8 caracteres', 'warning');
            return;
        }
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        this.toast('Sistema desbloqueado!', 'success');
        this.log('Sistema desbloqueado');
    },
    
    async loadGuidelines() {
        let loaded = 0;
        for (const g of GUIDELINES) {
            const exists = await db.evidence.where('pmid').equals(g.pmid).first();
            if (!exists) {
                await db.evidence.add(g);
                loaded++;
            }
        }
        const total = await db.evidence.count();
        this.toast(`${loaded} novas diretrizes | Total: ${total}`, 'success');
        this.log(`Diretrizes carregadas: ${total}`);
    },
    
    analyze() {
        const btn = document.getElementById('analyzeBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner mr-2"></span>Analisando...';
        
        setTimeout(() => {
            try {
                const data = {
                    age: document.getElementById('patientAge').value || '65',
                    gender: document.getElementById('patientGender').value || 'male',
                    subjective: document.getElementById('soapS').value,
                    objective: document.getElementById('soapO').value,
                    vitals: {
                        bp: document.getElementById('vitalBP').value,
                        hr: document.getElementById('vitalHR').value
                    },
                    medications: document.getElementById('patientMeds').value
                };
                
                // Executar diagnóstico
                const diagnoses = this.diagAgent.analyze(data);
                const pts = this.diagAgent.generatePTS(diagnoses);
                const soap = this.diagAgent.generateSOAP(data, diagnoses);
                
                // Renderizar resultados
                this.renderResults(diagnoses, pts, soap);
                
                // Salvar caso
                db.cases.add({
                    timestamp: new Date().toISOString(),
                    data: { diagnoses: diagnoses.length }
                });
                
                this.log(`Análise concluída: ${diagnoses.length} diagnósticos`);
                this.toast(`✅ Análise concluída! Diagnóstico principal: ${diagnoses[0].name}`, 'success');
                
            } catch (e) {
                console.error('Erro na análise:', e);
                this.toast('Erro na análise: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-stethoscope mr-2"></i>Executar Análise';
            }
        }, 100);
    },
    
    renderResults(diagnoses, pts, soap) {
        const container = document.getElementById('resultsContainer');
        const primary = diagnoses[0];
        
        container.innerHTML = `
            <div class="glass p-4 md:p-6 mb-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black">
                        <i class="fas fa-clipboard-check mr-3 text-purple-400"></i>
                        Resultado da Análise
                    </h2>
                    <span class="px-4 py-2 rounded-full text-sm font-bold ${primary.urgency === 'CRÍTICO' ? 'bg-red-500/20 text-red-400' : 'bg-yellow-500/20 text-yellow-400'}">
                        Urgência: ${primary.urgency}
                    </span>
                </div>
                
                <!-- SOAP -->
                <div class="space-y-3 mb-6">
                    <div class="soap-box soap-s-box">
                        <div class="soap-header">
                            <div class="soap-letter soap-s-letter">S</div>
                            <h3 class="font-black text-blue-400 uppercase">Subjetivo</h3>
                        </div>
                        <p class="text-sm opacity-80">${soap.subjective}</p>
                    </div>
                    
                    <div class="soap-box soap-o-box">
                        <div class="soap-header">
                            <div class="soap-letter soap-o-letter">O</div>
                            <h3 class="font-black text-green-400 uppercase">Objetivo</h3>
                        </div>
                        <p class="text-sm opacity-80">${soap.objective}</p>
                    </div>
                    
                    <div class="soap-box soap-a-box">
                        <div class="soap-header">
                            <div class="soap-letter soap-a-letter">A</div>
                            <h3 class="font-black text-purple-400 uppercase">Avaliação</h3>
                        </div>
                        <div class="space-y-2">
                            ${diagnoses.slice(0, 5).map((d, i) => `
                                <div class="p-4 rounded-xl ${i === 0 ? 'bg-red-500/10 border border-red-500/30' : 'bg-white/3'}">
                                    <div class="flex justify-between items-center">
                                        <span class="font-bold">${i+1}. ${d.name}</span>
                                        <span class="px-3 py-1 rounded-full text-xs font-bold ${d.posterior > 0.5 ? 'bg-red-500/20 text-red-400' : d.posterior > 0.2 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400'}">
                                            ${(d.posterior * 100).toFixed(1)}%
                                        </span>
                                    </div>
                                    <p class="text-xs opacity-60 mt-1">${d.tests.join(' • ')}</p>
                                    <p class="text-[10px] opacity-40 mt-1">${d.guidelines}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="soap-box soap-p-box">
                        <div class="soap-header">
                            <div class="soap-letter soap-p-letter">P</div>
                            <h3 class="font-black text-yellow-400 uppercase">Plano</h3>
                        </div>
                        <p class="text-sm opacity-80 whitespace-pre-line">${soap.plan}</p>
                    </div>
                </div>
                
                <!-- PTS -->
                <h3 class="text-lg font-black mb-3 text-green-400">
                    <i class="fas fa-calendar-alt mr-2"></i>Plano Terapêutico Singular (PTS)
                </h3>
                <div class="pts-grid">
                    <div class="pts-card" style="border-top-color: #FF3B30;">
                        <div class="font-bold text-red-400 mb-3">⚡ Imediato (0-6h)</div>
                        <ul class="space-y-2">
                            ${pts.immediate.map(i => `<li class="flex gap-2 text-sm"><i class="fas fa-chevron-right text-red-400/50 text-xs mt-1"></i>${i}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="pts-card" style="border-top-color: #FF9500;">
                        <div class="font-bold text-yellow-400 mb-3">📋 Médio Prazo (6-72h)</div>
                        <ul class="space-y-2">
                            ${pts.medium.map(i => `<li class="flex gap-2 text-sm"><i class="fas fa-chevron-right text-yellow-400/50 text-xs mt-1"></i>${i}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="pts-card" style="border-top-color: #34C759;">
                        <div class="font-bold text-green-400 mb-3">🏥 Longo Prazo (>72h)</div>
                        <ul class="space-y-2">
                            ${pts.long.map(i => `<li class="flex gap-2 text-sm"><i class="fas fa-chevron-right text-green-400/50 text-xs mt-1"></i>${i}</li>`).join('')}
                        </ul>
                    </div>
                </div>
                
                <!-- Disclaimer -->
                <div class="mt-6 p-4 rounded-xl bg-yellow-500/5 border border-yellow-500/20">
                    <p class="text-xs text-yellow-300/80">
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                        <strong>AUXÍLIO à decisão clínica.</strong> Este diagnóstico foi gerado por IA e deve ser revisado por médico habilitado.
                    </p>
                </div>
            </div>
        `;
        
        container.scrollIntoView({ behavior: 'smooth' });
    },
    
    quickFill() {
        document.getElementById('patientAge').value = '65';
        document.getElementById('patientGender').value = 'male';
        document.getElementById('vitalBP').value = '145/90';
        document.getElementById('vitalHR').value = '98';
        document.getElementById('soapS').value = 'Paciente 65 anos, masculino, refere dor torácica em aperto iniciada há 2 horas, irradiada para MSE, associada a sudorese fria e náusea. Nega episódios prévios. HAS, DM2.';
        document.getElementById('soapO').value = 'BEG, corado, PA 145/90, FC 98, SpO2 96%. ACV: RCR 2T. AR: MV presente sem RA.';
        document.getElementById('patientMeds').value = 'AAS 100mg, Metformina 1000mg, Losartana 50mg';
        this.toast('Caso exemplo preenchido!', 'info');
    },
    
    clearForm() {
        document.getElementById('patientAge').value = '';
        document.getElementById('soapS').value = '';
        document.getElementById('soapO').value = '';
        document.getElementById('patientMeds').value = '';
        document.getElementById('resultsContainer').innerHTML = '';
        this.toast('Formulário limpo', 'info');
    },
    
    async log(action) {
        await db.audit.add({
            timestamp: new Date().toISOString(),
            action: action
        });
        this.refreshAuditLog();
    },
    
    async refreshAuditLog() {
        const logs = await db.audit.orderBy('id').reverse().limit(5).toArray();
        const container = document.getElementById('auditLog');
        if (container) {
            container.innerHTML = logs.map(l => 
                `<div class="flex justify-between"><span>${l.action}</span><span class="opacity-50">${new Date(l.timestamp).toLocaleTimeString()}</span></div>`
            ).join('') || '<div class="opacity-30 text-center">Nenhum evento</div>';
        }
    },
    
    toast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
};
