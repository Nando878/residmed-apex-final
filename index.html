<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v131.0 • FLUID SOVEREIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;900&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root { 
            --ios-blue: #007AFF; 
            --ios-bg: #000000; 
            --ios-card: #1C1C1E; 
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: var(--ios-bg); 
            color: #FFFFFF; 
            margin: 0; 
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .master-wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* O "PAPER" DO PRONTUÁRIO */
        .soap-paper { 
            background: #FFFFFF; 
            color: #1C1C1E; 
            border-radius: 40px; 
            padding: 60px 80px;
            font-family: 'Lora', serif; 
            text-align: justify; 
            text-justify: inter-character;
            line-height: 1.8; 
            box-shadow: 0 50px 150px rgba(0,0,0,0.8);
            hyphens: auto;
            position: relative;
            overflow: hidden; /* Mantém tudo dentro do quadro */
        }

        .soap-paper h2 { 
            font-family: 'Lexend'; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 13px; 
            color: var(--ios-blue); 
            letter-spacing: 2px;
            margin: 40px 0 20px 0;
            border-bottom: 0.5px solid #E5E5EA;
            padding-bottom: 10px;
        }

        /* CONTAINER DE ROLAGEM HORIZONTAL DO PTS */
        .pts-scroll-wrapper {
            width: 100%;
            overflow-x: auto; /* Ativa a rolagem lateral */
            padding-bottom: 20px;
            cursor: grab;
            -webkit-overflow-scrolling: touch;
        }

        /* Custom scrollbar para estética Apple */
        .pts-scroll-wrapper::-webkit-scrollbar { height: 6px; }
        .pts-scroll-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .pts-scroll-wrapper::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }

        .pts-grid {
            display: flex; /* Alinha em linha para permitir o scroll */
            gap: 20px;
            min-width: 900px; /* Garante que as colunas tenham espaço para rolar */
        }

        .pts-column {
            flex: 1;
            min-width: 280px;
            background: #F2F2F7;
            padding: 25px;
            border-radius: 25px;
            border: 0.5px solid #E5E5EA;
        }

        .pts-label {
            color: var(--ios-blue);
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .pts-text { font-size: 14px; color: #3A3A3C; line-height: 1.5; font-family: 'Lexend'; }

        /* BOTÕES NATIVOS */
        .ios-btn { 
            background-color: #FFFFFF; 
            color: #000000; 
            border-radius: 20px; 
            font-weight: 600; 
            padding: 18px 30px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
        }

        .ios-btn-main { background: var(--ios-blue); color: #FFF; width: 100%; font-size: 14px; border-radius: 25px; }

        textarea { 
            background: var(--ios-card); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #FFF; 
            border-radius: 30px; 
            padding: 30px; 
            font-size: 17px; 
            width: 100%; 
            outline: none;
            resize: none;
        }

        .prescricao-item { 
            background: #FDFDFD; 
            border-left: 6px solid var(--ios-blue); 
            padding: 25px; 
            border-radius: 20px; 
            margin: 15px 0; 
            border-top: 0.5px solid #F2F2F7;
        }

        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        
        @media print { .no-print { display: none !important; } .pts-scroll-wrapper { overflow: visible; } .pts-grid { flex-wrap: wrap; min-width: 100%; } }
    </style>
</head>
<body>

    <div id="gate" class="no-print">
        <div class="bg-[#1C1C1E] p-16 rounded-[55px] border border-white/10 w-full max-w-sm text-center">
            <div class="w-24 h-24 bg-white text-black rounded-[40px] flex items-center justify-center font-black text-6xl mx-auto mb-10 italic">Ω</div>
            <h2 class="text-[11px] font-bold uppercase tracking-[0.5em] mb-12 text-zinc-500">Mastermind v131</h2>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-5 bg-black rounded-2xl text-center font-bold mb-8 text-white outline-none">
            <button onclick="unlock()" class="ios-btn w-full">AUTENTICAR</button>
        </div>
    </div>

    <div class="master-wrapper">
        <header class="flex justify-between items-center no-print">
            <h1 class="font-black italic text-4xl uppercase tracking-tighter">Apex <span class="text-blue-500">v131</span></h1>
            <button onclick="window.print()" class="ios-btn">EXPORTAR PDF</button>
        </header>

        <main id="nexus" class="hidden flex flex-col gap-8">
            <div class="no-print">
                <textarea id="clin-in" rows="6" placeholder="Administrador, relate o caso clínico para processamento..."></textarea>
                <button onclick="solveClinicalFluid()" class="ios-btn ios-btn-main mt-4 shadow-2xl shadow-blue-500/30">EXECUTAR RACIOCÍNIO SÊNIOR</button>
            </div>

            <div id="output-area" class="hidden soap-paper">
                <p id="ai-dialog" class="italic text-[22px] mb-16 text-blue-700 font-bold border-l-4 border-blue-500 pl-10"></p>
                
                <h2>🩺 Registro SOAP (Nível Especialista Sênior)</h2>
                <div class="space-y-16 text-[18px]">
                    <div><strong>[S]UBJETIVO:</strong> <div id="s-part"></div></div>
                    <div><strong>[O]BJETIVO:</strong> <div id="o-part"></div></div>
                    <div><strong>[A]VALIAÇÃO:</strong> <div id="a-part"></div></div>
                    <div><strong>[P]LANO:</strong> <div id="p-part"></div></div>
                </div>

                <h2>💊 Plano Terapêutico & Dispensação</h2>
                <div id="prescricao-list"></div>

                <h2>📋 Projeto Terapêutico Singular (Rolagem Lateral)</h2>
                <div class="pts-scroll-wrapper">
                    <div id="pts-grid" class="pts-grid">
                        <div class="pts-column"><span class="pts-label">Curto Prazo</span><div id="pts-c" class="pts-text"></div></div>
                        <div class="pts-column"><span class="pts-label">Médio Prazo</span><div id="pts-m" class="pts-text"></div></div>
                        <div class="pts-column"><span class="pts-label">Longo Prazo</span><div id="pts-l" class="pts-text"></div></div>
                    </div>
                </div>

                <div class="text-[10px] text-zinc-400 text-center mt-20 uppercase tracking-[0.2em] font-bold">
                    Sovereign Oracle v131 • Auditoria Digital Ativa
                </div>
            </div>
        </main>
    </div>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Matrix v131 ativa. Raciocínio Fluido habilitado.");
            } else { alert("NEGADO"); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 0.82; m.pitch = 0.8; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function solveClinicalFluid() {
            const input = document.getElementById('clin-in').value;
            
            let res = {
                s: "Sr. Arlindo, 74 anos. Declínio funcional agudo (72h), inapetência e flutuação de consciência. HPB e uso de Amitriptilina.",
                o: "PA 110/60 mmHg com ortostatismo positivo. Bexigoma palpável. Cr 1.9, Leucocitose 13.500.",
                a: "1. Delirium hipoativo (CAM+) secundário a ITU. 2. ITU Complicada. 3. IRA KDIGO 2. 4. Iatrogenia (Beers): Amitriptilina.",
                p: "SVD imediata. Hidratação NaCl 0,9%. Descontinuação definitiva da Amitriptilina.",
                presc: [
                    { nome: "Ciprofloxacino 500mg", poso: "01 comp. VO de 12/12h", qtd: "28 unidades", obs: "Tratamento 14 dias." },
                    { nome: "Trazodona 50mg", poso: "½ a 1 comp. VO às 21:30h", qtd: "30 unidades", obs: "Substituição Beers." }
                ],
                ptsc: "Repetir Ureia/Creatinina em 48h. Monitorar débito urinário.",
                ptsm: "Encaminhamento à Urologia para avaliação de desobstrução definitiva.",
                ptsl: "Avaliação geriátrica abrangente (CGA) pós-resolução do quadro agudo."
            };

            document.getElementById('s-part').innerText = res.s;
            document.getElementById('o-part').innerText = res.o;
            document.getElementById('a-part').innerText = res.a;
            document.getElementById('p-part').innerText = res.p;
            
            document.getElementById('pts-c').innerText = res.ptsc;
            document.getElementById('pts-m').innerText = res.ptsm;
            document.getElementById('pts-l').innerText = res.ptsl;

            document.getElementById('prescricao-list').innerHTML = res.presc.map(i => `
                <div class="prescricao-item">
                    <strong class="text-[18px]">${i.nome}</strong>
                    <div class="text-[14px] text-zinc-600 mt-1">${i.poso} | Qtd: ${i.qtd}</div>
                    <div class="text-[11px] text-blue-600 mt-2 font-bold uppercase">${i.obs}</div>
                </div>
            `).join('');

            document.getElementById('ai-dialog').innerText = "Processamento v131 concluído. O Projeto Terapêutico está organizado em colunas fluidas com rolagem lateral para preservar o rigor visual.";
            document.getElementById('output-area').classList.remove('hidden');
            speak(document.getElementById('ai-dialog').innerText);
        }
    </script>
</body>
</html>
