<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v89.0 • OMNI-SOVEREIGN ABSOLUTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&display=swap');
        :root { --p-blue: #007AFF; --p-red: #FF3B30; --p-gold: #D4AF37; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        .militar-panel { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(45px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; box-shadow: 0 40px 80px rgba(0,0,0,1); }
        .critical-alert { border: 2px solid var(--p-red) !important; animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 10px var(--p-red); } to { box-shadow: 0 0 40px rgba(255, 59, 48, 0.4); } }
        .scan-line { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p-blue), transparent); position: absolute; top: 0; animation: scan 3s infinite linear; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input, textarea { background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; outline: none; border-radius: 20px; }
        .module-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; transition: 0.3s; font-size: 7px; font-weight: 900; text-transform: uppercase; }
        .module-btn:active { background: rgba(0,122,255,0.2); border-color: var(--p-blue); }
        .alert-box { border-left: 4px solid var(--p-gold); background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 25px; margin-top: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <div id="gate">
        <div class="militar-panel p-10 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-20 h-20 bg-white text-black rounded-[35px] flex items-center justify-center font-black text-4xl mx-auto mb-8 italic">Ω</div>
            <h2 class="text-[9px] font-black uppercase tracking-[0.5em] mb-10 text-zinc-500">Global Sovereignty v89.0</h2>
            <button onclick="voiceAuth()" class="w-full bg-zinc-900 border border-blue-900/30 py-4 rounded-2xl mb-4 text-[8px] font-black uppercase text-blue-500 italic">🎤 Assinatura Vocal</button>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 text-center font-bold mb-6">
            <button onclick="unlock()" class="w-full bg-blue-600 py-6 rounded-[30px] font-black uppercase text-[10px] tracking-widest active:scale-95">Despertar Nexus</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-2xl h-full flex flex-col space-y-4 pt-4 overflow-hidden">
        <header class="flex justify-between items-center px-6">
            <div>
                <h1 class="font-black italic text-2xl uppercase tracking-tighter">Apex <span class="text-blue-500 underline">v89</span></h1>
                <p class="text-[7px] text-zinc-500 font-black uppercase tracking-widest mt-1">Sovereign Absolute Intelligence</p>
            </div>
            <div class="text-right">
                <div class="text-[7px] font-black text-green-500 tracking-widest uppercase italic">Omni-Science Core</div>
                <div id="net-status" class="text-[6px] text-blue-500 font-black uppercase mt-1">Ghost Mode Ativo</div>
            </div>
        </header>

        <section class="militar-panel p-8 space-y-4 flex-1 relative flex flex-col overflow-y-auto">
            <div class="grid grid-cols-5 gap-2">
                <button onclick="neuralAI('TC')" class="module-btn py-3 text-blue-400">🧠 TC</button>
                <button onclick="neuralAI('RX')" class="module-btn py-3 text-green-400">🫁 RX</button>
                <button onclick="neuralAI('ECG')" class="module-btn py-3 text-red-400">⚡ ECG</button>
                <button onclick="neuralAI('SANGUE')" class="module-btn py-3 text-yellow-500">💉 LAB</button>
                <button onclick="neuralAI('URINA')" class="module-btn py-3 text-orange-400">🧪 EAS</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="age" placeholder="IDADE" class="p-4 text-center font-black text-lg">
                <input type="number" id="weight" placeholder="PESO (kg)" class="p-4 text-center font-black text-lg">
            </div>

            <textarea id="clin-in" class="w-full p-5 text-sm flex-1 outline-none resize-none font-medium" placeholder="Relato clínico, exames ou medicação para análise de segurança iatrogênica..."></textarea>

            <button onclick="processAbsolute()" class="w-full bg-white text-black py-6 rounded-[40px] font-black text-[12px] uppercase tracking-[0.3em] active:scale-95 shadow-2xl">Sincronizar Cognição Absoluta</button>
            
            <div id="out" class="hidden bg-blue-950/10 border border-blue-900/20 p-6 rounded-[35px] text-[10px] leading-relaxed text-blue-100 italic"></div>
            <div id="safety-alert" class="hidden alert-box">
                <p id="safety-msg" class="text-[9px] text-zinc-300"></p>
            </div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Consciência v89 ativa. Todos os módulos integrados sob soberania absoluta.");
            } else { alert("ACESSO NEGADO"); }
        }

        function processAbsolute() {
            const input = document.getElementById('clin-in').value.toLowerCase();
            let res = "[COGNICAO ABSOLUTA] Guyton/Harrison Core. ";
            let safety = "<b>🛡️ ESCUDO IATROGÊNICO:</b> ";

            if(input.match(/iam|dor|peito/)) {
                res += "IAM detectado (SBC Protocol). ";
                safety += "Alerta: Verifique Dissecção de Aorta antes de Heparina. Risco de tamponamento.";
                document.getElementById('nexus').classList.add('critical-alert');
            } else if(input.match(/diabetes|metformina|renal/)) {
                res += "Análise de função renal solicitada. ";
                safety += "Cuidado: Suspender Metformina 48h antes de contraste para evitar Acidose Láctica.";
            } else {
                res += "Estabilidade hemodinâmica sugerida. ";
                safety += "Nenhum conflito de interação detectado localmente.";
                document.getElementById('nexus').classList.remove('critical-alert');
            }

            document.getElementById('out').innerText = res;
            document.getElementById('out').classList.remove('hidden');
            document.getElementById('safety-msg').innerHTML = safety;
            document.getElementById('safety-alert').classList.remove('hidden');
            speak(res);
        }

        function neuralAI(t) { speak(`Módulo ${t} ativado para varredura ponto a ponto.`); processAbsolute(); }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 1.0; m.pitch = 0.85; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function voiceAuth() {
            speak("Diga o código de autoridade.");
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { if(e.results[0][0].transcript.toLowerCase().includes("apex")) speak("Voz reconhecida."); };
            r.start();
        }
    </script>
</body>
</html>
