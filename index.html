<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>APEX v74.1 • BIO-LOGIC CONSCIOUSNESS</title> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap'); 
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; } 
        .militar-panel { background: #050505; border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; } 
        .critical { border: 2px solid #FF3B30 !important; animation: pulse 1s infinite alternate; } 
        @keyframes pulse { from { box-shadow: 0 0 10px #FF3B30; } to { box-shadow: 0 0 40px rgba(255, 59, 48, 0.4); } } 
        #gate { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; } 
        .bio-error { border: 2px solid #EAB308 !important; } 
    </style> 
</head> 
<body class="p-4 h-screen flex flex-col justify-center bg-zinc-950"> 
 
    <div id="gate"> 
        <div class="militar-panel p-10 w-full max-w-sm text-center border-zinc-800 shadow-2xl"> 
            <div class="w-20 h-20 bg-white text-black rounded-[35px] flex items-center justify-center font-black text-4xl mx-auto mb-8 italic">Ω</div> 
            <h2 class="text-[9px] font-black uppercase tracking-[0.4em] mb-8 text-zinc-500">Security Gate v74.1</h2> 
            <input type="text" id="user" placeholder="ADMIN ID" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl mb-3 text-center text-sm font-bold text-white outline-none focus:border-blue-600"> 
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl mb-8 text-center text-sm font-bold text-white outline-none focus:border-blue-600"> 
            <button onclick="auth()" class="w-full bg-blue-600 py-5 rounded-3xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Ativar Consciência</button> 
        </div> 
    </div> 
 
    <main id="nexus" class="max-w-xl mx-auto w-full militar-panel p-8 space-y-6 hidden relative"> 
        <header class="flex justify-between items-start"> 
            <div> 
                <h1 class="font-black italic text-xl tracking-tighter uppercase">Apex <span class="text-blue-500 underline">v74.1</span></h1> 
                <p id="location-tag" class="text-[7px] text-blue-400 font-black uppercase tracking-widest italic mt-1">Sincronizando Localização...</p> 
                <button onclick="DeepShield.toggleGeofence()" class="text-[6px] text-zinc-600 uppercase font-black hover:text-yellow-500 transition-all mt-1">⚙ Geofencing Admin</button> 
            </div> 
            <div class="text-right"> 
                <div id="bio-integrity" class="text-[6px] font-black text-green-500 tracking-widest uppercase italic">Bio-Lógica: Estável</div> 
                <div id="conn-status" class="text-[6px] text-zinc-500 font-black uppercase italic mt-1">Soberania Offline</div> 
            </div> 
        </header> 
 
        <section class="space-y-4"> 
            <div class="grid grid-cols-2 gap-3"> 
                <input type="number" id="age" placeholder="Idade (Anos)" class="p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-center font-bold outline-none focus:border-blue-500"> 
                <input type="number" id="weight" placeholder="Peso (kg)" class="p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-center font-bold outline-none focus:border-blue-500"> 
            </div> 
            <textarea id="clin-in" class="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-3xl text-sm h-32 outline-none focus:border-blue-500" placeholder="Insira o caso clínico para análise cognitiva..."></textarea> 
             
            <div id="bio-warning" class="hidden p-4 bg-yellow-900/10 border border-yellow-500/20 rounded-2xl text-[9px] text-yellow-500 font-bold uppercase tracking-widest text-center"></div> 
 
            <div class="grid grid-cols-2 gap-2"> 
                <button onclick="startVoice()" class="bg-zinc-900 border border-zinc-800 py-3 rounded-2xl text-[8px] font-black uppercase italic text-blue-500">🎤 Voz Tática</button> 
                <button onclick="biometricScan()" class="bg-zinc-900 border border-zinc-800 py-3 rounded-2xl text-[8px] font-black uppercase text-zinc-500">🔍 Scan Óptico</button> 
            </div> 
 
            <button onclick="runApex()" class="w-full bg-blue-700 py-5 rounded-[30px] font-black text-[10px] uppercase tracking-[0.2em] shadow-2xl active:scale-95 transition-all">Processar Cognição Apex</button> 
        </section> 
 
        <div id="out" class="hidden p-6 bg-black border border-zinc-800 rounded-[30px] text-[10px] leading-relaxed text-zinc-400 italic"></div> 
    </main> 
 
    <script> 
        const MASTER_ID = "APEX-ADMIN";  
        const MASTER_KEY = "PALMAS-2026"; 
        const PALMAS_COORDS = { lat: -10.18, lon: -48.33 }; 
 
        function auth() { 
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(u === MASTER_ID && p === MASTER_KEY) { 
                document.getElementById('gate').style.display = 'none'; 
                document.getElementById('nexus').classList.remove('hidden'); 
                DeepShield.init(); 
                ConnectivityMonitor.init(); 
                speak("Consciência Apex v74.1 ativada. Bloqueio automático de perímetro desativado pelo administrador."); 
            } else { alert("ACESSO NEGADO."); } 
        } 
 
        const BioLogic = { 
            validate: function(age, weight) { 
                if (age < 1 && weight > 25) return "ALERTA: Peso incompatível com idade lactante."; 
                if (weight > 400 || weight < 0.4) return "ERRO: Parâmetro fora dos limites fisiológicos."; 
                return null; 
            }, 
            crossCheck: function(history, result) { 
                const highRiskTerms = ["choque", "pcr", "parada", "infarto", "embolia"]; 
                const riskFound = highRiskTerms.some(term => history.toLowerCase().includes(term)); 
                if (riskFound && !result.risk) return "DIVERGÊNCIA: Risco vital detectado."; 
                return null; 
            } 
        }; 
 
        const DeepShield = { 
            isGeofenceActive: true, 
            init: function() { this.startGeofencing(); }, 
            toggleGeofence: function() { 
                this.isGeofenceActive = !this.isGeofenceActive;
                const tag = document.getElementById('location-tag');
                if (!this.isGeofenceActive) {
                    tag.innerText = "DEFESA: MONITORAMENTO MANUAL"; 
                    tag.className = "text-[7px] text-yellow-500 font-black italic uppercase mt-1"; 
                    alert("Monitoramento automático de perímetro desativado.");
                } else {
                    tag.innerText = "ZONA SOBERANA: ATIVA"; 
                    tag.className = "text-[7px] text-blue-400 font-black italic uppercase mt-1"; 
                }
            }, 
            startGeofencing: function() { 
                if (navigator.geolocation) { 
                    navigator.geolocation.getCurrentPosition((pos) => { 
                        const dist = Math.sqrt(Math.pow(pos.coords.latitude - PALMAS_COORDS.lat, 2) + Math.pow(pos.coords.longitude - PALMAS_COORDS.lon, 2)); 
                        const tag = document.getElementById('location-tag'); 
                        if (dist > 0.8) { tag.innerText = "SISTEMA FORA DE PALMAS (MODO VISITANTE)"; tag.className = "text-[7px] text-zinc-500 font-black italic uppercase mt-1"; } 
                        else { tag.innerText = "ZONA SOBERANA: PALMAS-TO"; } 
                    }); 
                } 
            }
        }; 
 
        const ConnectivityMonitor = { 
            init: function() { 
                this.up(navigator.onLine); 
                window.addEventListener('online', () => this.up(true)); 
                window.addEventListener('offline', () => this.up(false)); 
            }, 
            up: function(on) { 
                const el = document.getElementById('conn-status'); 
                el.innerText = on ? "Sincronia Nuvem" : "Modo Soberano Offline"; 
                el.className = `text-[6px] font-black uppercase italic ${on ? 'text-green-500' : 'text-blue-500'}`; 
            } 
        }; 
 
        const Engine = { 
            process: function(age, weight, history) { 
                const text = history.toLowerCase(); 
                let r = { risk: false, msg: "" }; 
                if(text.match(/avc|cefaleia|fala/)) { r.risk = true; r.msg = "[AAN] Protocolo Neuro-Sênior. "; } 
                if(age < 12) { r.msg += `[Nelson] Dose: ${(weight * 0.15).toFixed(2)}mg. `; } 
                if(text.includes('dengue') || text.includes('to')) { r.msg += "[MS-TO] Manejo Arboviroses Palmas. "; } 
                return r; 
            } 
        }; 
 
        function runApex() { 
            const age = document.getElementById('age').value; 
            const weight = document.getElementById('weight').value; 
            const history = document.getElementById('clin-in').value; 
            const bioWarn = document.getElementById('bio-warning'); 
            const bioError = BioLogic.validate(age, weight); 
            if(bioError) { 
                bioWarn.innerText = bioError; bioWarn.classList.remove('hidden'); 
                document.getElementById('nexus').classList.add('bio-error'); 
                speak(bioError); return; 
            } else { 
                bioWarn.classList.add('hidden'); document.getElementById('nexus').classList.remove('bio-error'); 
            } 
            const res = Engine.process(age, weight, history); 
            const crossError = BioLogic.crossCheck(history, res); 
            const finalMsg = crossError ? `ALERTA: ${crossError} | ${res.msg}` : res.msg; 
            if(res.risk || crossError) document.getElementById('nexus').classList.add('critical'); 
            else document.getElementById('nexus').classList.remove('critical'); 
            const output = `[ANALISE COGNITIVA] ${finalMsg}`; 
            document.getElementById('out').innerText = output; 
            document.getElementById('out').classList.remove('hidden'); 
            speak(output); 
        } 
 
        function speak(t) { 
            window.speechSynthesis.cancel(); 
            const m = new SpeechSynthesisUtterance(t); 
            m.rate = 1.0; m.pitch = 0.9; 
            window.speechSynthesis.speak(m); 
        } 
        function biometricScan() { speak("Módulo facultativo óptico iniciado."); } 
        function startVoice() { 
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); 
            r.lang = 'pt-BR'; 
            r.onresult = (e) => { document.getElementById('clin-in').value = e.results[0][0].transcript; runApex(); }; 
            r.start(); 
        } 
    </script> 
</body> 
</html>
