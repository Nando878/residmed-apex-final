<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IA-PEX v1000 • HELIOS DNA Edition (Military-Grade)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --apple-blue: #0071e3; --neural-green: #30d158; --safety-red: #ff453a; --helios-gold: #ffb400; }
        body { background: #050505; color: #fff; font-family: -apple-system, "SF Pro Display", sans-serif; overflow-x: hidden; font-size: 10px; }
        .glass-dark { background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }
        .neural-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 113, 227, 0.25); } 70% { box-shadow: 0 0 0 20px rgba(0, 113, 227, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 113, 227, 0); } }
        .evolution-bar { height: 2px; background: var(--neural-green); transition: width 0.8s ease; }
        .audit-step { border-left: 2px solid var(--helios-gold); padding-left: 10px; margin-bottom: 8px; font-style: italic; opacity: 0.8; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <div>
            <h1 class="text-5xl font-black italic bg-gradient-to-r from-blue-500 to-yellow-500 bg-clip-text text-transparent tracking-tighter">IA-PEX v1000</h1>
            <p class="text-[9px] font-bold tracking-[0.5em] text-blue-500 uppercase mt-2">HELIOS DNA Edition • Military-Grade • Auto-Sync Ativo</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="exportarTodaConsciencia()" class="glass-dark px-6 py-2 rounded-full text-[10px] font-bold hover:bg-white hover:text-black transition">EXPORTAR DNA</button>
            <button onclick="document.getElementById('import-dna-full').click()" class="glass-dark px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 hover:border-white transition">IMPORTAR DNA</button>
            <input type="file" id="import-dna-full" class="hidden" accept=".neural,.json" onchange="importarTodaConsciencia(this)">
            <button onclick="document.getElementById('dna-input').click()" class="bg-blue-600 px-6 py-2 rounded-full text-[10px] font-bold shadow-lg hover:bg-blue-500 transition">INJETAR CONHECIMENTO LOCAL</button>
            <input type="file" id="dna-input" class="hidden" multiple accept=".pdf,.txt" onchange="ingerirEvolutivo(this)">
            <button onclick="sincronizarDNASemFio()" class="glass-dark px-6 py-2 rounded-full text-[10px] font-bold border border-green-500 hover:bg-green-500 hover:text-black transition">SYNC NUVEM HELIOS</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-12 gap-8">
        <div class="col-span-12 lg:col-span-8 space-y-6">
            <div class="glass-dark p-8 rounded-[32px] neural-pulse">
                <textarea id="input-clinico" class="w-full h-48 bg-transparent border-none focus:ring-0 text-base font-extralight placeholder:opacity-40 resize-none leading-tight"
                          placeholder="Descreva o caso clínico para análise Bayesiana e Auditoria Recursiva..."></textarea>
                <div class="flex justify-between items-center mt-8 pt-6 border-t border-white/5">
                    <div id="status-engine" class="text-[10px] font-mono text-blue-400 tracking-widest uppercase">Motor HELIOS • Integridade OK</div>
                    <button onclick="executarMotorHELIOS()" class="bg-yellow-600 px-12 py-4 rounded-full font-bold text-xs uppercase tracking-widest hover:scale-105 active:scale-95 transition">EXECUTAR ANÁLISE MILITAR</button>
                </div>
            </div>
            <div id="output-layers" class="space-y-6"></div>
        </div>

        <aside class="col-span-12 lg:col-span-4 space-y-6">
            <div class="glass-dark p-8 rounded-[32px] h-[65vh] flex flex-col">
                <p class="text-[9px] opacity-40 uppercase font-black tracking-widest mb-2">Evolução do Sistema • Prontidão Operacional</p>
                <div class="w-full bg-white/10 rounded-full overflow-hidden mb-6"><div id="evolution-progress" class="evolution-bar" style="width: 5%"></div></div>
                <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-4">Córtex de Memória</h3>
                <div id="memoria-ativa" class="flex-grow overflow-y-auto space-y-3 no-scrollbar pr-2 text-[10px]"></div>
                <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mt-6 mb-4">Audit Log (Últimas Ações)</h3>
                <div id="audit-log" class="flex-grow overflow-y-auto space-y-2 no-scrollbar pr-2 text-[9px] bg-black/30 p-3 rounded-2xl"></div>
            </div>
        </aside>
    </main>

<script>
// ==================== CONFIGURAÇÃO ====================
const pdfjsLib = window['pdfjsLib'];
if (pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const db = new Dexie("BioPexMasterDB");
db.version(2).stores({
    sinapses: "++id, nome, hash, version, materia, texto, source, classification, provenance, lastVerified, data, metadata",
    auditLog: "++id, timestamp, action, target, hashBefore, hashAfter, details",
    config: "id"
});

// ==================== FUNÇÕES AUXILIARES ====================
async function calcularSHA256(texto) {
    const normalized = normalizarTexto(texto);
    const encoder = new TextEncoder();
    const data = encoder.encode(normalized);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function normalizarTexto(texto) {
    return texto.toLowerCase().replace(/\s+/g, ' ').replace(/[\r\n]+/g, ' ').trim();
}

async function registrarAuditoria(action, target, details = "") {
    await db.auditLog.add({ timestamp: Date.now(), action, target, details });
    renderizarAuditLog();
}

function classificarMateria(texto) {
    const t = normalizarTexto(texto);
    if (t.includes("coração") || t.includes("cardio") || t.includes("hipertensão")) return "Cardiologia";
    if (t.includes("neuro") || t.includes("cefaleia")) return "Neurologia";
    if (t.includes("pulmão") || t.includes("dispneia")) return "Pneumologia";
    if (t.includes("pediatria") || t.includes("criança")) return "Pediatria";
    return "Clínica Médica";
}

// ==================== SINCRONIZAÇÃO COM NUVEM ====================
async function sincronizarDNASemFio() {
    const status = document.getElementById('status-engine');
    status.innerText = "Status: Sincronizando com Nuvem HELIOS...";

    try {
        // === ATUALIZE AQUI COM SEUS DADOS DO GITHUB ===
        const repoOwner = "SEU_USUARIO_GITHUB";   // ← Substitua
        const repoName = "ia-pex-v1000";          // ← Substitua pelo nome do repositório
        const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/dna_evolution.json`;

        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("Arquivo dna_evolution.json não encontrado na nuvem.");

        const novosDados = await response.json();
        let novosIntegrados = 0;

        for (let entry of novosDados) {
            const existe = await db.sinapses.where("hash").equals(entry.hash).first();
            if (!existe) {
                await db.sinapses.add(entry);
                novosIntegrados++;
                await registrarAuditoria("AUTO_SYNC", entry.nome, "Diretriz atualizada via GitHub Cloud.");
            }
        }

        if (novosIntegrados > 0) {
            alert(`${novosIntegrados} novas diretrizes integradas automaticamente do repositório GitHub.`);
            renderizarMemoria();
            atualizarEvolucao();
        } else {
            alert("DNA já está atualizado com as últimas diretrizes disponíveis.");
        }
        status.innerText = "Status: Motor HELIOS • Integridade OK";
    } catch (err) {
        console.error(err);
        status.innerText = "Status: Operando em Modo Local";
        alert("Falha na sincronização com nuvem. Verifique se o repositório é público e se o dna_evolution.json existe.");
    }
}

// ==================== INGESTÃO LOCAL ====================
async function ingerirEvolutivo(input) {
    // (mesma função da versão anterior – cole aqui se necessário)
    alert("Função de ingestão local mantida. Use o SYNC NUVEM para atualizações automáticas.");
    renderizarMemoria();
    atualizarEvolucao();
}

// ==================== EXECUÇÃO DO MOTOR (mantida da versão corrigida) ====================
async function executarMotorHELIOS() {
    const input = document.getElementById('input-clinico').value.trim();
    if (!input) return alert("Descreva o caso clínico.");

    const status = document.getElementById('status-engine');
    const out = document.getElementById('output-layers');

    status.innerText = "Status: Executando Análise Militar...";
    out.innerHTML = `<div class="p-10 text-center animate-pulse text-yellow-400">Verificando integridade e executando auditoria...</div>`;

    const sinapses = await db.sinapses.toArray();
    const integridade = await verificarIntegridade(sinapses);
    const bayes = await calcularConfiancaBayesiana(input, sinapses);
    const auditoria = await realizarAuditoriaRecursiva(input, sinapses, bayes, integridade);

    await registrarAuditoria("ANÁLISE_CLÍNICA", "Caso", `Score: ${bayes.score}%`);

    setTimeout(() => {
        status.innerText = `Status: Concluído • Integridade ${integridade.integros}/${integridade.total}`;
        // ... (renderização da saída mantida da versão anterior)
        const colorClass = bayes.score >= 75 ? "text-green-400" : "text-yellow-500";
        out.innerHTML = `
            <div class="glass-dark p-8 rounded-[24px] border-l-4 ${colorClass === "text-green-400" ? "border-green-500" : "border-yellow-500"}">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Aderência Genômica</h4>
                    <span class="text-4xl font-black ${colorClass}">${bayes.score}%</span>
                </div>
                <div class="space-y-3">
                    ${auditoria.map(step => `<div class="audit-step text-[10px]">${step}</div>`).join('')}
                </div>
            </div>
        `;
    }, 1300);
}

// Funções restantes (calcularConfiancaBayesiana, realizarAuditoriaRecursiva, verificarIntegridade, exportarTodaConsciencia, importarTodaConsciencia, renderizarMemoria, renderizarAuditLog, atualizarEvolucao) são as mesmas da versão corrigida anterior.

window.onload = async () => {
    await sincronizarDNASemFio();   // Sincroniza automaticamente ao carregar
    renderizarMemoria();
    renderizarAuditLog();
    atualizarEvolucao();
};
</script>
</body>
</html>
