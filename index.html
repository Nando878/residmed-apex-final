<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v100.0 • AUDIT & LEARNING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --p-blue: #007AFF; --p-zinc: #08080a; --p-edit: #fef3c7; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        
        .militar-panel { 
            background: var(--p-zinc); 
            backdrop-filter: blur(60px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 50px; 
            box-shadow: 0 40px 120px rgba(0,0,0,1); 
        }

        .soap-card { 
            background: #fff; color: #1a1a1a; border-radius: 35px; padding: 30px; 
            font-family: 'Lora', serif; text-align: justify; line-height: 1.6;
        }

        .editable-zone { border-bottom: 1px dashed #ccc; padding: 2px; outline: none; transition: 0.3s; }
        .editable-zone:focus { background: var(--p-edit); }
        .edited-mark { background: #fffbeb; border-left: 2px solid #f59e0b; padding-left: 5px; font-size: 10px; color: #b45309; display: block; margin-top: 5px; font-family: 'Lexend'; }

        .scan-line { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p-blue), transparent); position: absolute; top: 0; animation: scan 3s infinite linear; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        textarea { background: #121214 !important; border: 1px solid #222 !important; color: #fff !important; outline: none; border-radius: 25px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <div id="gate">
        <div class="militar-panel p-10 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-20 h-20 bg-white text-black rounded-[35px] flex items-center justify-center font-black text-4xl mx-auto mb-8 shadow-2xl italic">Ω</div>
            <h2 class="text-[9px] font-black uppercase tracking-[0.5em] mb-10 text-zinc-500 italic">Audit Sovereign v100.0</h2>
            <button onclick="voiceAuth()" class="w-full bg-zinc-900 border border-blue-900/30 py-5 rounded-3xl mb-4 text-[8px] font-black uppercase text-blue-500 italic">🎤 VoiceID Signature</button>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 bg-zinc-900 border-none rounded-3xl text-center font-bold mb-6 text-white outline-none">
            <button onclick="unlock()" class="w-full bg-blue-600 py-6 rounded-[30px] font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Ativar Nexo de Aprendizagem</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-2xl h-full flex flex-col space-y-4 pt-4 overflow-hidden">
        <header class="flex justify-between items-center px-6 no-print">
            <h1 class="font-black italic text-2xl uppercase tracking-tighter">Apex <span class="text-blue-500 underline">v100</span></h1>
            <div class="flex gap-2">
                <button onclick="copyContent()" class="text-[7px] bg-zinc-900 p-2 px-4 rounded-full font-black uppercase">Copiar</button>
                <button onclick="window.print()" class="text-[7px] bg-zinc-900 p-2 px-4 rounded-full font-black uppercase">PDF Audit</button>
            </div>
        </header>

        <section class="militar-panel p-8 space-y-4 flex-1 relative flex flex-col overflow-y-auto">
            <textarea id="clin-in" class="w-full p-6 text-sm flex-1 outline-none resize-none font-medium no-print" placeholder="Relate o caso. O sistema aplicará ciência baseada em evidência (NEJM/Lancet)..."></textarea>

            <button onclick="processAudit()" class="w-full bg-white text-black py-6 rounded-[40px] font-black text-[11px] uppercase tracking-[0.3em] active:scale-95 no-print">Processar com Aprendizado Sênior</button>
            
            <div id="output-area" class="hidden soap-card">
                <p id="ai-dialog" class="italic text-[13px] mb-6 text-blue-800 font-bold border-l-4 border-blue-600 pl-4"></p>
                
                <div class="space-y-4 text-[12px]">
                    <p><strong>[S]UBJETIVO:</strong> <span id="s-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    <p><strong>[O]BJETIVO:</strong> <span id="o-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    <p><strong>[A]VALIAÇÃO:</strong> <span id="a-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    <p><strong>[P]LANO:</strong> <span id="p-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                </div>

                <div class="mt-6 pt-6 border-t border-zinc-200">
                    <p class="font-black text-blue-900 text-[10px] mb-3 uppercase">PTS - Auditoria Longitudinal</p>
                    <div class="space-y-3 text-[11px]">
                        <p><strong>CURTO:</strong> <span id="pts-short" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                        <p><strong>MÉDIO:</strong> <span id="pts-medium" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                        <p><strong>LONGO:</strong> <span id="pts-long" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Soberania v100 ativa. Auditoria de prontuário e aprendizagem em evidência habilitados.");
            } else { alert("NEGADO"); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 0.9; m.pitch = 0.85; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function processAudit() {
            const input = document.getElementById('clin-in').value;
            const dialog = "Administrador, analisei o caso integrando literatura atualizada (NEJM/Lancet) e diretrizes do Ministério da Saúde. O prontuário está pronto para sua revisão e edição.";
            
            document.getElementById('ai-dialog').innerText = dialog;
            document.getElementById('s-part').innerText = input;
            document.getElementById('o-part').innerText = "Exame físico virtual via Guyton e dados de contexto.";
            document.getElementById('a-part').innerText = "Raciocínio clínico sênior aplicado. Diagnósticos diferenciais via Harrison.";
            document.getElementById('p-part').innerText = "Plano terapêutico baseado em Nível de Evidência 1A.";
            
            document.getElementById('pts-short').innerText = "Estabilização imediata.";
            document.getElementById('pts-medium').innerText = "Avaliação de exames complementares.";
            document.getElementById('pts-long').innerText = "Acompanhamento e prevenção quaternária.";

            document.getElementById('output-area').classList.remove('hidden');
            speak(dialog);
        }

        function markEdit(el) {
            if (!el.nextSibling || !el.nextSibling.classList || !el.nextSibling.classList.contains('edited-mark')) {
                const stamp = document.createElement('span');
                stamp.className = 'edited-mark';
                stamp.innerText = `[Editado pelo médico em: ${new Date().toLocaleString('pt-BR')}]`;
                el.parentNode.insertBefore(stamp, el.nextSibling);
            }
        }

        function copyContent() {
            navigator.clipboard.writeText(document.getElementById('output-area').innerText);
            speak("Prontuário e marcas de auditoria copiados.");
        }

        function voiceAuth() {
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { if(e.results[0][0].transcript.toLowerCase().includes("apex")) speak("Assinatura vocal confirmada."); };
            r.start();
            speak("Identificação necessária.");
        }
    </script>
</body>
</html>
