<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX v174 • UNIVERSAL CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        body { background: #000; color: #FFF; font-family: 'JetBrains Mono', monospace; margin: 0; overflow-x: hidden; }
        .zone { position: sticky; top: 0; padding: 15px; background: rgba(0,0,0,0.98); border-bottom: 2px solid #1A1A1A; z-index: 100; backdrop-filter: blur(10px); }
        textarea { background: #0A0A0A; border: 1px solid #333; color: #00FF41 !important; border-radius: 12px; padding: 15px; width: 100%; outline: none; font-size: 16px; -webkit-appearance: none; }
        textarea:focus { border-color: #00FF41; }
        .viewport { padding: 20px; display: none; }
        .paper-content { font-family: 'Lora', serif; text-align: justify; line-height: 1.8; font-size: 16px; color: #E0E0E0; }
        h2 { color: #00FF41; border-bottom: 2px solid #1A1A1A; padding-bottom: 10px; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; margin-top: 40px; }
        .soap-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 10px; border-left: 3px solid #00FF41; margin-bottom: 15px; }
        .btn-main { background: #00FF41; color: #000; font-weight: 900; width: 100%; padding: 12px; border-radius: 8px; margin-top: 10px; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="zone no-print">
    <div class="flex justify-between items-center mb-3">
        <h1 class="font-black italic text-lg uppercase">Apex <span class="text-[#00FF41]">v174</span></h1>
        <div id="status" class="text-[9px] text-zinc-500 uppercase">Status: Ready</div>
    </div>
    <textarea id="in" rows="3" placeholder="Insira o caso..."></textarea>
    <button id="execBtn" class="btn-main">Executar Análise</button>
</div>

<main id="nexus" class="viewport">
    <div class="paper-content" id="output"></div>
</main>

<script>
    const API_KEY = 'AIzaSyBCWOXSosudmIfZ4qDsWK-8Ze7EbqnfZNQ';
    const inputField = document.getElementById('in');
    const execBtn = document.getElementById('execBtn');

    // GATILHO UNIVERSAL (TECLADO)
    inputField.addEventListener('keydown', function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            process();
        }
    });

    // GATILHO UNIVERSAL (BOTÃO)
    execBtn.addEventListener('click', process);

    async function process() {
        const input = inputField.value;
        if (!input) return;

        document.getElementById('status').innerText = "PROCESSANDO...";
        document.getElementById('nexus').style.display = "none";

        const systemPrompt = `Aja como Médico Sênior HCFMUSP. Analise com profundidade máxima. 
        Gere um SOAP EXPANDIDO e PTS de 3 Fases. 
        Seja técnico, use doses e diretrizes 2026. 
        CASO: ${input}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt }] }],
                    safetySettings: [{ category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                alert("ERRO: " + data.error.message);
                return;
            }

            const text = data.candidates[0].content.parts[0].text;
            render(text);
            document.getElementById('status').innerText = "OPERACIONAL";
        } catch (error) {
            alert("ERRO DE REDE: Verifique se o App permite conexões externas.");
            console.error(error);
        }
    }

    function render(text) {
        document.getElementById('nexus').style.display = 'block';
        const formatted = text
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/### (.*?)(<br>|$)/g, '<h2>$1</h2>')
            .replace(/\[S\]/g, '<div class="soap-box"><b>[S]ubjetivo</b>')
            .replace(/\[O\]/g, '</div><div class="soap-box"><b>[O]bjetivo</b>')
            .replace(/\[A\]/g, '</div><div class="soap-box"><b>[A]valiação</b>')
            .replace(/\[P\]/g, '</div><div class="soap-box"><b>[P]lano</b>')
            .concat('</div>');
            
        document.getElementById('output').innerHTML = formatted;
        window.scrollTo({top: 0, behavior: 'smooth'});
        inputField.blur();
    }
</script>
</body>
</html>
