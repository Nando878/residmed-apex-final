<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>APEX v250 • Holistic Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --apple-blue: #007AFF; --apple-bg: #f5f5f7; --status-green: #34c759; }
        body { background-color: var(--apple-bg); color: #1d1d1f; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .apple-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .update-bar { background: #000; color: var(--status-green); font-size: 9px; padding: 4px 10px; font-weight: bold; text-align: center; letter-spacing: 1px; }
        .btn-holistic { background: linear-gradient(180deg, #007AFF 0%, #0056b3 100%); color: white; border-radius: 14px; font-weight: 600; padding: 18px; width: 100%; box-shadow: 0 10px 20px rgba(0,122,255,0.3); transition: 0.3s; }
        .soap-section { border-left: 3px solid #e5e5ea; padding-left: 15px; margin-bottom: 20px; transition: 0.3s; }
        .soap-section:hover { border-left-color: var(--apple-blue); }
        .specialty-tag { font-size: 10px; background: rgba(0,122,255,0.1); color: var(--apple-blue); padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="update-bar" id="sync-status">● AGUARDANDO SINCRONIZAÇÃO COM DIRETRIZES 2026</div>

    <header class="glass-header p-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">APEX <span class="text-blue-600">Holistic</span></h1>
                <p class="text-[10px] opacity-50 uppercase font-bold">Protocolos Transdisciplinares</p>
            </div>
            <button onclick="toggleConfig()" class="text-gray-400">⚙️</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-5 space-y-6">
        
        <section id="config" class="hidden apple-card p-6 space-y-4">
            <input type="password" id="api-key" placeholder="Insira Gemini API Key" class="w-full p-3 bg-gray-100 rounded-lg outline-none text-sm">
            <div class="text-[10px] text-gray-400 italic">O software utiliza Google Search Grounding para atualizar diretrizes em tempo real.</div>
        </section>

        <section class="apple-card p-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold text-gray-400 uppercase">Perfil Clínico Sistêmico</span>
                <span id="auto-tag" class="specialty-tag">Multi-Áreas Ativo</span>
            </div>
            
            <textarea id="patient-data" class="w-full bg-gray-50 p-4 rounded-xl border-none outline-none text-lg mb-4" rows="5" placeholder="Descreva o paciente (ex: Idoso, DM2, queixa de tontura, histórico familiar...)"></textarea>
            
            <div class="flex gap-2 mb-4">
                <input type="file" id="lab-results" class="hidden" multiple onchange="alert('Exames integrados à análise.')">
                <button onclick="document.getElementById('lab-results').click()" class="text-xs font-semibold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg">+ Anexar Exames/PDFs</button>
            </div>

            <button onclick="triggerHolisticAnalysis()" class="btn-holistic">DISPARAR AVALIAÇÃO INTEGRAL</button>
        </section>

        <div id="output" class="space-y-6 pb-20"></div>
    </main>

    <script>
        function toggleConfig() { document.getElementById('config').classList.toggle('hidden'); }

        // Simulação de atualização automática ao carregar
        window.onload = () => {
            const status = document.getElementById('sync-status');
            setTimeout(() => {
                status.innerText = "● DIRETRIZES ATUALIZADAS: SBC, SBD, ASCO, AHA (ABRIL 2026)";
                status.style.color = "#34c759";
            }, 2000);
        };

        async function triggerHolisticAnalysis() {
            const key = document.getElementById('api-key').value;
            const input = document.getElementById('patient-data').value;
            const output = document.getElementById('output');

            if(!key) return alert("Configure a API Key para sincronizar diretrizes.");

            output.innerHTML = `
                <div class="apple-card p-10 text-center">
                    <div class="animate-bounce mb-4 text-blue-600">●</div>
                    <p class="text-sm font-semibold">Cruzando diretrizes de todas as especialidades...</p>
                </div>
            `;

            // O PROMPT É A CHAVE DA ATUALIZAÇÃO E HOLÍSTICA
            const holisticPrompt = `
                Analise o paciente como um todo, agindo como uma junta médica de preceptores do HCFMUSP. 
                IMPORTANTE: Pesquise e utilize as DIRETRIZES MAIS RECENTES DE 2025-2026 de todas as sociedades relevantes (Cardiologia, Endocrinologia, Nefrologia, etc.).
                
                Caso: ${input}

                Estruture a resposta rigorosamente em:
                1. [S]ubjetivo
                2. [O]bjetivo
                3. [A]valiação Holística: Não liste apenas doenças. Explique como uma condição afeta a outra (ex: como o rim afeta o coração neste paciente).
                4. [P]lano Terapêutico Integrado: Priorize intervenções que tratem múltiplas frentes.
                5. [PTS] Projeto Terapêutico Singular: Foque no contexto psicossocial e metas de longo prazo.
                6. [REF] Cite as diretrizes atualizadas utilizadas para esta decisão.
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: holisticPrompt }] }],
                        tools: [{ google_search_retrieval: {} }] // ATIVA A BUSCA DE DIRETRIZES EM TEMPO REAL
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                renderHolistic(result);
            } catch (e) {
                output.innerHTML = "<div class='apple-card p-6 text-red-500'>Erro na conexão com a rede de diretrizes.</div>";
            }
        }

        function renderHolistic(text) {
            const formatted = text
                .replace(/\n/g, '<br>')
                .replace(/\[S\]/g, '<div class="soap-section"><b class="text-blue-600">SUBJETIVO</b>')
                .replace(/\[O\]/g, '</div><div class="soap-section"><b class="text-blue-600">OBJETIVO</b>')
                .replace(/\[A\]/g, '</div><div class="soap-section"><b class="text-blue-600">AVALIAÇÃO INTEGRADA</b>')
                .replace(/\[P\]/g, '</div><div class="soap-section"><b class="text-blue-600">PLANO TERAPÊUTICO</b>')
                .replace(/\[PTS\]/g, '</div><div class="soap-section" style="border-left-color:#34c759"><b style="color:#34c759 text-transform:uppercase">Projeto Terapêutico Singular</b>')
                .replace(/\[REF\]/g, '</div><div class="mt-4 p-4 bg-gray-100 rounded-lg text-[10px] text-gray-500 font-mono"><b>DIRETRIZES ATIVADAS:</b>');

            document.getElementById('output').innerHTML = `
                <div class="apple-card p-6 slide-up">
                    <div class="text-[16px] leading-relaxed text-gray-800">${formatted}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
