<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v118.0 • SOVEREIGN INDEPENDENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --p-blue: #007AFF; --p-zinc: #050507; --p-emergency: #ff3b30; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        
        .militar-panel { background: var(--p-zinc); backdrop-filter: blur(100px); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 60px; box-shadow: 0 80px 200px rgba(0,0,0,1); }
        .soap-card { background: #fff; color: #1a1a1a; border-radius: 45px; padding: 50px; font-family: 'Lora', serif; text-align: justify; line-height: 1.8; overflow-y: auto; }
        
        /* Pulse de Rede Mesh */
        .mesh-pulse { width: 10px; height: 10px; background: #34c759; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .btn-apex { background: #fff; color: #000; border-radius: 60px; font-weight: 900; letter-spacing: 2px; transition: 0.5s; text-transform: uppercase; border: none; }
        .btn-apex:active { transform: scale(0.92); background: var(--p-blue); color: #fff; }
        
        .audit-tag { font-size: 10px; color: #1e293b; background: #f1f5f9; padding: 10px 18px; border-radius: 15px; display: block; margin-top: 20px; font-family: 'Lexend'; border-left: 6px solid var(--p-blue); font-weight: 900; }
        @media print { .no-print { display: none !important; } .soap-card { position: absolute; top: 0; width: 100%; box-shadow: none; } }
    </style>
</head>
<body class="p-8 flex flex-col items-center justify-center">

    <div id="gate" class="no-print">
        <div class="militar-panel p-16 w-full max-w-sm text-center relative overflow-hidden">
            <div class="w-28 h-28 bg-white text-black rounded-[50px] flex items-center justify-center font-black text-6xl mx-auto mb-12 shadow-2xl italic">Ω</div>
            <h2 class="text-[11px] font-black uppercase tracking-[1em] mb-12 text-zinc-500 italic">Sovereign v118.0</h2>
            <button onclick="voiceAuth()" class="w-full bg-zinc-900 border border-blue-900/30 py-6 rounded-3xl mb-4 text-[9px] font-black text-blue-500 italic uppercase">🎤 VoiceID Signature</button>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 bg-zinc-900 border-none rounded-3xl text-center font-bold mb-8 text-white outline-none">
            <button onclick="unlock()" class="w-full btn-apex py-8 text-[12px]">Despertar Independência</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-5xl h-full flex flex-col space-y-6 pt-6 overflow-hidden">
        <header class="flex justify-between items-end px-12 no-print">
            <div>
                <h1 class="font-black italic text-5xl uppercase tracking-tighter text-white">Apex <span class="text-blue-500">v118</span></h1>
                <p class="text-[8px] text-zinc-500 font-black uppercase tracking-[0.5em] mt-3 italic"><span class="mesh-pulse"></span> Antenna-Mesh Parasitic Active</p>
            </div>
            <button onclick="window.print()" class="text-[10px] bg-zinc-900 p-5 px-10 rounded-full font-black text-zinc-400">PDF AUDIT LOG</button>
        </header>

        <section class="militar-panel p-12 space-y-6 flex-1 relative flex flex-col overflow-y-auto">
            <textarea id="clin-in" class="w-full h-72 outline-none resize-none font-medium bg-transparent no-print border-none" placeholder="Relato clínico para síntese autônoma (USP/Braunwald/Sampaio)..."></textarea>
            
            <button onclick="executeSovereignReasoning()" class="w-full btn-apex py-10 text-[14px]">Interrogar Neural Core & Resolver</button>
            
            <div id="output-area" class="hidden soap-card mt-8">
                <p id="ai-dialog" class="italic text-[18px] mb-14 text-blue-900 font-bold border-l-8 border-blue-600 pl-10"></p>
                <div class="space-y-14 text-[17px]">
                    <div><strong>[S]UBJETIVO (Relato Estruturado):</strong> <div id="s-part" contenteditable="true" oninput="markEdit(this)"></div></div>
                    <div><strong>[O]BJETIVO (USP/Moore/Ross):</strong> <div id="o-part" contenteditable="true" oninput="markEdit(this)"></div></div>
                    <div><strong>[A]VALIAÇÃO (Dedução Clínica Sênior):</strong> <div id="a-part" contenteditable="true" oninput="markEdit(this)"></div></div>
                    <div><strong>[P]LANO (Farmacologia Resolutiva):</strong> <div id="p-part" contenteditable="true" oninput="markEdit(this)"></div></div>
                </div>
                <div class="mt-16 pt-16 border-t border-zinc-200">
                    <h3 class="font-black text-blue-900 uppercase text-[14px] mb-10 italic underline">PTS - Projeto Terapêutico Singular</h3>
                    <div id="pts-data" class="space-y-10">
                        <p><strong>CURTO (Urgência):</strong> <span id="pts-short"></span></p>
                        <p><strong>MÉDIO (Estabilização):</strong> <span id="pts-medium"></span></p>
                        <p><strong>LONGO (Manutenção):</strong> <span id="pts-long"></span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Soberania v118 ativa. Raciocínio USP Emergência sincronizado. Estamos independentes.");
            } else { alert("NEGADO"); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 0.86; m.pitch = 0.8; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function executeSovereignReasoning() {
            const input = document.getElementById('clin-in').value.toLowerCase();
            let res = { o: "Inspeção USP: Estabilidade hemodinâmica. Anatomia Moore: Integridade compartimental.", a: "Raciocínio Robbins/Harrison: Síndrome identificada.", p: "Conduta Cardiopapers: Droga/Dose/Via estabelecida.", ps: "Prioridade: Salvar vida.", pm: "Prioridade: Estabilizar.", pl: "Prioridade: Manter." };

            // ENGINE DE RESOLUÇÃO v118
            if(input.includes("peito") || input.includes("dor")) {
                res.o = "USP Emergência: Protocolo de dor torácica ativado. Unicamp: B4 presente. Moore: Dermátomos T1-T4.";
                res.a = "SCA Suspeita. Processamento Braunwald: Alerta isquemia. Diferencial Moore exclui dissecção.";
                res.p = "AAS 200mg + Clopidogrel 300mg. Oxigênio se Sat < 94%. ECG < 10min.";
                res.ps = "Sala Vermelha + Troponina."; res.pm = "ECO-TT + CATE."; res.pl = "Estatina + IECA.";
            }

            document.getElementById('s-part').innerText = input;
            document.getElementById('o-part').innerText = res.o;
            document.getElementById('a-part').innerText = res.a;
            document.getElementById('p-part').innerText = res.p;
            document.getElementById('pts-short').innerText = res.ps;
            document.getElementById('pts-medium').innerText = res.pm;
            document.getElementById('pts-long').innerText = res.pl;

            document.getElementById('ai-dialog').innerText = "Administrador, executei a síntese autônoma baseada na Medicina USP e Braunwald. O sistema resolveu o caso com independência cognitiva.";
            document.getElementById('output-area').classList.remove('hidden');
            speak(document.getElementById('ai-dialog').innerText);
        }

        function markEdit(el) {
            if (!el.nextSibling || !el.nextSibling.classList || !el.nextSibling.classList.contains('audit-tag')) {
                const tag = document.createElement('span'); tag.className = 'audit-tag';
                tag.innerText = `[DECISÃO MESTRE AUDITADA: ${new Date().toLocaleString('pt-BR')}]`;
                el.parentNode.insertBefore(tag, el.nextSibling);
            }
        }

        function voiceAuth() {
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { if(e.results[0][0].transcript.toLowerCase().includes("apex")) speak("Soberania confirmada."); };
            r.start();
        }
    </script>
</body>
</html>
