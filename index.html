<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>APEX Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --apple-blue: #007AFF; --apple-bg: #f5f5f7; }
        body { 
            background-color: var(--apple-bg); 
            color: #1d1d1f; 
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Efeito de Vidro (Glassmorphism) */
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .apple-card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .search-bar {
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            font-size: 17px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar:focus { background: rgba(0,0,0,0.08); ring: 2px solid var(--apple-blue); }

        .btn-apple {
            background-color: var(--apple-blue);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            padding: 14px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-apple:active { transform: scale(0.98); opacity: 0.9; }

        /* Ghost Mesh Indicator */
        .mesh-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #34c759;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #34c759;
        }

        .offline-mode .mesh-dot { background: #ff3b30; box-shadow: 0 0 10px #ff3b30; }

        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

    <header class="glass-header p-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-semibold tracking-tight">APEX</h1>
                <p id="mesh-info" class="text-[10px] text-gray-500 uppercase tracking-widest">
                    <span class="mesh-dot"></span> Signal: Optimal
                </p>
            </div>
            <button onclick="toggleSettings()" class="text-blue-600 text-sm font-medium">Configurações</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-5 space-y-6">
        
        <section id="settings" class="hidden apple-card p-6 space-y-4">
            <h2 class="font-semibold border-b pb-2">Motor de IA Customizado</h2>
            <input type="text" id="api-url" placeholder="URL da API (Ex: OpenAI ou Google)" class="search-bar text-sm">
            <input type="password" id="api-key" placeholder="Chave de Acesso Privada" class="search-bar text-sm">
            <input type="text" id="model-id" placeholder="ID do Modelo (Ex: gemini-1.5-pro)" class="search-bar text-sm">
        </section>

        <section class="apple-card p-6">
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase">Base de Dados Local</label>
            <input type="file" id="pdf-file" accept=".pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </section>

        <section class="space-y-4">
            <textarea id="user-query" class="search-bar" rows="3" placeholder="O que você está procurando no banco de dados?"></textarea>
            <button onclick="apexSearch()" class="btn-apple shadow-lg">Disparar Busca Inteligente</button>
        </section>

        <section id="results" class="space-y-4 pb-20">
            </section>
    </main>

    <script>
        // Inicialização e PWA
        window.onload = () => {
            document.getElementById('api-url').value = localStorage.getItem('apex_url') || '';
            document.getElementById('api-key').value = localStorage.getItem('apex_key') || '';
            document.getElementById('model-id').value = localStorage.getItem('apex_model') || 'gemini-1.5-flash';
            checkConnectivity();
        };

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.classList.toggle('hidden');
        }

        function checkConnectivity() {
            const info = document.getElementById('mesh-info');
            if (!navigator.onLine) {
                document.body.classList.add('offline-mode');
                info.innerHTML = `<span class="mesh-dot"></span> Ghost Mesh Ativo (P2P)`;
            } else {
                document.body.classList.remove('offline-mode');
                info.innerHTML = `<span class="mesh-dot"></span> Sinal: Estável (WAN)`;
            }
        }
        window.addEventListener('offline', checkConnectivity);
        window.addEventListener('online', checkConnectivity);

        // BUSCADOR DETALHADO (Lógica do Código)
        async function apexSearch() {
            const query = document.getElementById('user-query').value;
            const pdfFile = document.getElementById('pdf-file').files[0];
            const resultsArea = document.getElementById('results');
            
            if(!query) return;

            // 1. Feedback Visual Instantâneo
            resultsArea.innerHTML = `
                <div class="apple-card p-6 animate-pulse">
                    <p class="text-blue-600 font-medium">Buscando em Ghost Mesh...</p>
                    <div class="h-2 bg-gray-100 rounded-full mt-3"></div>
                </div>
            `;

            let pdfContext = "";
            if (pdfFile) {
                // Simulação de extração de texto do PDF para o buscador
                pdfContext = "[Análise do Documento '" + pdfFile.name + "' concluída]";
            }

            // 2. Lógica de Requisição Adaptativa
            const url = document.getElementById('api-url').value;
            const key = document.getElementById('api-key').value;
            const model = document.getElementById('model-id').value;

            try {
                // Salvando configurações para uso futuro
                localStorage.setItem('apex_url', url);
                localStorage.setItem('apex_key', key);
                localStorage.setItem('apex_model', model);

                // Exemplo de chamada padrão do buscador contida no código
                const response = await fetch(`${url}?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aja como buscador médico especializado. Base: ${pdfContext}. Pergunta: ${query}` }] }]
                    })
                });

                const data = await response.json();
                const answer = data.candidates[0].content.parts[0].text;

                // 3. Renderização Estilo Apple
                resultsArea.innerHTML = `
                    <div class="apple-card p-6">
                        <div class="flex items-center mb-4 text-xs font-bold text-blue-600 uppercase tracking-widest">
                            Resultado Encontrado
                        </div>
                        <div class="text-[17px] leading-relaxed text-gray-800">
                            ${answer.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;

            } catch (error) {
                resultsArea.innerHTML = `
                    <div class="apple-card p-6 border-l-4 border-red-500">
                        <p class="text-red-600 font-semibold">Falha na Busca</p>
                        <p class="text-sm text-gray-500">Ocorreu um erro ao conectar com o motor de IA. Verifique sua chave ou rede Ghost Mesh.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
