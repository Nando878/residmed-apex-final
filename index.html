<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>APEX v167.1 • FAST TRIGGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        :root { --p: #00FF41; --bg: #000; --b: #1A1A1A; --blue: #007AFF; --militar: #FF0000; }
        
        body { background: var(--bg); color: #FFF; font-family: 'JetBrains Mono', monospace; margin: 0; transition: background 0.5s; }
        body.mode-military { background: #050505; }

        .zone { position: sticky; top: 0; padding: 20px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--b); z-index: 100; backdrop-filter: blur(10px); }
        textarea { background: #111; border: 1px solid var(--b); color: #FFF !important; border-radius: 12px; padding: 20px; width: 100%; outline: none; resize: none; font-size: 16px; transition: border 0.3s; }
        textarea:focus { border-color: var(--p); }
        
        .viewport { padding: 40px 60px; display: none; min-height: 100vh; }
        .paper-content { color: #FFF; font-family: 'Lora', serif; text-align: justify; line-height: 1.8; }
        
        .btn { background: var(--blue); color: #FFF; border-radius: 8px; font-weight: 800; padding: 10px 20px; cursor: pointer; border: none; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        .mode-selector { display: flex; gap: 10px; background: #111; padding: 5px; border-radius: 10px; border: 1px solid #333; }
        .mode-btn { padding: 6px 12px; font-size: 9px; border-radius: 6px; cursor: pointer; font-weight: bold; opacity: 0.5; }
        .mode-btn.active { opacity: 1; background: #222; color: var(--p); border: 1px solid var(--p); }

        h2 { color: var(--p); border-bottom: 1px solid var(--b); padding-bottom: 10px; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; margin-top: 40px; }

        @media print { 
            .no-print { display: none !important; }
            .viewport { display: block !important; background: #FFF !important; padding: 0 !important; }
            .paper-content { color: #000 !important; font-family: "Times New Roman", serif !important; font-size: 8pt !important; }
        }
    </style>
</head>
<body id="master-body">

<div id="gate" class="fixed inset-0 bg-black z-[1000] flex items-center justify-center">
    <div class="text-center p-12 border border-zinc-800 rounded-3xl bg-zinc-950">
        <h1 class="text-white font-black text-3xl italic mb-8 uppercase tracking-widest text-[#00FF41]">Apex Ω</h1>
        <button onclick="syncDrive()" class="btn w-full">SINCRONIZAR DRIVE</button>
    </div>
</div>

<div class="zone no-print">
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-4">
            <h1 class="font-black italic text-xl text-white uppercase">Apex <span class="text-[#00FF41]">v167.1</span></h1>
            <div class="mode-selector">
                <div id="btn-aca" class="mode-btn active" onclick="setMode('academic')">ACADÊMICO</div>
                <div id="btn-mil" class="mode-btn" onclick="setMode('military')">VANGUARD</div>
            </div>
        </div>
        <div class="text-[9px] text-zinc-600">PRESS [ENTER] TO EXECUTE</div>
    </div>
    <textarea id="in" rows="3" placeholder="Insira o caso... (Enter para pesquisar)" onkeydown="checkEnter(event)"></textarea>
    <button onclick="executeHybrid()" class="btn w-full mt-4 py-3 text-[11px] tracking-[0.2em] hover:bg-white hover:text-black">EXECUTAR INFERÊNCIA HÍBRIDA</button>
</div>

<main id="nexus" class="viewport">
    <div class="paper-content">
        <div id="out-soap"></div>
        <h2>PROJETO TERAPÊUTICO SINGULAR (PTS)</h2>
        <div id="out-pts" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6"></div>
    </div>
</main>

<script>
    const CLIENT_ID = 'COLE_AQUI_SEU_CLIENT_ID';
    const API_KEY = 'COLE_AQUI_SUA_API_KEY';
    let currentMode = 'academic';

    // FUNÇÃO DE GATILHO PELO TECLADO
    function checkEnter(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault(); // Impede a quebra de linha
            executeHybrid(); // Dispara a pesquisa
        }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-aca').className = (m === 'academic') ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-mil').className = (m === 'military') ? 'mode-btn active' : 'mode-btn';
        document.getElementById('master-body').className = (m === 'military') ? 'mode-military' : '';
    }

    function syncDrive() {
        document.getElementById('gate').style.display = 'none';
    }

    function executeHybrid() {
        const input = document.getElementById('in').value;
        if(!input) return;
        document.getElementById('nexus').style.display = 'block';
        
        // Simulação de Output
        const soap = `<h2>SOAP ${currentMode === 'military' ? 'TÁTICO' : 'ACADÊMICO'}</h2><div class='mb-4'>Processamento concluído com base na biblioteca HCFMUSP e atualizações 2026.</div>`;
        const pts = `<div class='p-4 border border-zinc-800 rounded-xl'>Ações imediatas e preventivas estruturadas.</div>`;

        document.getElementById('out-soap').innerHTML = soap;
        document.getElementById('out-pts').innerHTML = pts;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>
</body>
</html>
