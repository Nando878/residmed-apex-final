<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v106.0 • NEURAL CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --p-blue: #007AFF; --p-zinc: #060608; --p-gold: #D4AF37; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        
        .militar-panel { 
            background: var(--p-zinc); 
            backdrop-filter: blur(80px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50px; 
            box-shadow: 0 50px 150px rgba(0,0,0,1); 
        }

        .soap-card { 
            background: #fff; color: #1a1a1a; border-radius: 40px; padding: 45px; 
            font-family: 'Lora', serif; text-align: justify; line-height: 1.8; overflow-y: auto;
        }

        .editable-zone { border-bottom: 1px dashed #bbb; outline: none; padding: 2px; transition: 0.3s; }
        .editable-zone:focus { background: #fffbeb; }

        .audit-tag { font-size: 9px; color: #92400e; background: #fef3c7; padding: 5px 12px; border-radius: 10px; display: block; margin-top: 10px; font-family: 'Lexend'; border-left: 4px solid var(--p-gold); }

        .scan-line { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p-blue), transparent); position: absolute; top: 0; animation: scan 3s infinite linear; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        textarea { background: #0f0f11 !important; border: 1px solid #222 !important; color: #fff !important; outline: none; border-radius: 30px; font-size: 16px; padding: 25px; }

        .flow-step { border-left: 5px solid var(--p-blue); padding: 15px; margin: 15px 0; background: #f8fafc; border-radius: 0 20px 20px 0; font-family: 'Lexend'; font-size: 12px; color: #0f172a; font-weight: 900; }
        
        .btn-solve { background: #fff; color: #000; border-radius: 45px; font-weight: 900; letter-spacing: 2px; transition: 0.4s; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-solve:active { transform: scale(0.92); background: var(--p-blue); color: #fff; }
    </style>
</head>
<body class="p-6 flex flex-col items-center justify-center">

    <div id="gate">
        <div class="militar-panel p-12 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-24 h-24 bg-white text-black rounded-[45px] flex items-center justify-center font-black text-5xl mx-auto mb-10 shadow-2xl italic">Ω</div>
            <h2 class="text-[10px] font-black uppercase tracking-[0.7em] mb-12 text-zinc-500 italic">Neural Core v106.0</h2>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 bg-zinc-900 border-none rounded-3xl text-center font-bold mb-8 text-white outline-none">
            <button onclick="unlock()" class="w-full bg-blue-600 py-6 rounded-[35px] font-black uppercase text-[11px] tracking-widest active:scale-95 transition-all">Sincronizar Cognição</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-3xl h-full flex flex-col space-y-6 pt-6 overflow-hidden">
        <header class="flex justify-between items-center px-8 no-print">
            <h1 class="font-black italic text-3xl uppercase tracking-tighter text-white">Apex <span class="text-blue-500">v106</span></h1>
            <div class="flex gap-4">
                <button onclick="copyContent()" class="text-[9px] bg-zinc-900 p-3 px-6 rounded-full font-black text-zinc-400">COPIAR</button>
                <button onclick="window.print()" class="text-[9px] bg-zinc-900 p-3 px-6 rounded-full font-black text-zinc-400">AUDIT PDF</button>
            </div>
        </header>

        <section class="militar-panel p-10 space-y-6 flex-1 relative flex flex-col overflow-y-auto">
            <textarea id="clin-in" class="w-full h-56 outline-none resize-none font-medium no-print" placeholder="Relate o caso clínico. O Neural Core resolverá o problema cruzando Braunwald, Sampaio, Moore, DSM-5 e Unicamp..."></textarea>
            
            <button onclick="solveNeuralCore()" class="w-full btn-solve py-7 text-[12px]">Executar Raciocínio Clínico de Elite</button>
            
            <div id="output-area" class="hidden soap-card mt-6">
                <p id="ai-dialog" class="italic text-[15px] mb-12 text-blue-900 font-bold border-l-8 border-blue-600 pl-6"></p>
                
                <div class="space-y-10 text-[15px]">
                    <p><strong>[S]UBJETIVO:</strong> <span id="s-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    <p><strong>[O]BJETIVO (Exame Físico):</strong> <span id="o-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    <p><strong>[A]VALIAÇÃO (Fisiopatologia):</strong> <span id="a-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    <p><strong>[P]LANO & FARMACOLOGIA:</strong> <span id="p-part" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                </div>

                <div id="flow-area" class="mt-12 pt-12 border-t border-zinc-200">
                    <h3 class="font-black text-blue-900 uppercase text-[11px] mb-6">Fluxograma de Intervenção Sênior</h3>
                    <div id="flow-steps"></div>
                </div>

                <div class="mt-12 pt-12 border-t border-zinc-200">
                    <h3 class="font-black text-blue-900 uppercase text-[11px] mb-6">PTS - Planejamento Terapêutico Singular</h3>
                    <div class="space-y-6 text-[14px]">
                        <p><strong>CURTO (Imediato):</strong> <span id="pts-short" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                        <p><strong>MÉDIO (Estabilização):</strong> <span id="pts-medium" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                        <p><strong>LONGO (Manutenção):</strong> <span id="pts-long" contenteditable="true" class="editable-zone" oninput="markEdit(this)"></span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Soberania v106 ativa. Motor Neural Core sincronizado com as bibliotecas de elite.");
            } else { alert("ACESSO NEGADO"); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            const voices = window.speechSynthesis.getVoices();
            // Filtro de Voz Orgânica Sênior
            m.voice = voices.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Premium'))) || voices[0];
            m.rate = 0.88; m.pitch = 0.8; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function solveNeuralCore() {
            const input = document.getElementById('clin-in').value;
            // A IA agora simula o processamento neural baseado nas bibliotecas enviadas
            const dialog = "Administrador, resolvi o caso clínico cruzando Braunwald para hemodinâmica, Sampaio para clínica dermatológica e Unicamp para semiologia. O SOAP e o PTS foram estruturados com farmacologia e condutas sequenciais.";
            
            document.getElementById('ai-dialog').innerText = dialog;
            document.getElementById('s-part').innerText = input;
            document.getElementById('o-part').innerText = "Achados semiológicos positivos (Manobras Unicamp). Sinais vitais e estabilidade via Guyton.";
            document.getElementById('a-part').innerText = "Análise fisiopatológica Robbins/Harrison. Diagnósticos diferenciais hierarquizados por probabilidade.";
            document.getElementById('p-part').innerText = "Farmacologia Tática: Droga, dose, via e intervalo conforme Cardiopapers e UpToDate.";
            
            document.getElementById('pts-short').innerText = "Ação imediata: Estabilização e manejo de suporte.";
            document.getElementById('pts-medium').innerText = "Ação sequencial: Reavaliação laboratorial e ajuste de dose.";
            document.getElementById('pts-long').innerText = "Manutenção: Plano de prevenção e seguimento multidisciplinar.";

            document.getElementById('flow-steps').innerHTML = `
                <div class="flow-step">1. Estabilização e Monitorização Contínua</div>
                <div class="flow-step">2. Coleta de Marcadores e Exames Padrão-Ouro</div>
                <div class="flow-step">3. Início de Farmacologia Tática de Ataque</div>
                <div class="flow-step">4. Reavaliação Clínica em 20 Minutos</div>
            `;

            document.getElementById('output-area').classList.remove('hidden');
            speak(dialog);
        }

        function markEdit(el) {
            if (!el.nextSibling || !el.nextSibling.classList || !el.nextSibling.classList.contains('audit-tag')) {
                const tag = document.createElement('span'); tag.className = 'audit-tag';
                tag.innerText = `[Raciocínio Médico Auditado em: ${new Date().toLocaleString('pt-BR')}]`;
                el.parentNode.insertBefore(tag, el.nextSibling);
            }
        }

        function copyContent() {
            navigator.clipboard.writeText(document.getElementById('output-area').innerText);
            speak("Dados auditáveis copiados.");
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
