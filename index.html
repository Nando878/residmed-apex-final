<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v92.0 • GLOBAL NOMAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&display=swap');
        :root { --p-blue: #007AFF; --p-red: #FF3B30; --p-green: #34C759; --p-gold: #D4AF37; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        
        .militar-panel { 
            background: rgba(8, 8, 10, 0.99); 
            backdrop-filter: blur(50px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50px; 
            box-shadow: 0 40px 100px rgba(0,0,0,1); 
        }

        .scan-line { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p-blue), transparent); position: absolute; top: 0; animation: scan 3s infinite linear; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input, textarea { background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; outline: none; border-radius: 20px; }
        
        .global-badge { font-size: 7px; background: var(--p-blue); color: #fff; font-weight: 900; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
        .critical-alert { border: 2px solid var(--p-red) !important; animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 10px var(--p-red); } to { box-shadow: 0 0 40px rgba(255, 59, 48, 0.4); } }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <div id="gate">
        <div class="militar-panel p-10 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-20 h-20 bg-white text-black rounded-[35px] flex items-center justify-center font-black text-4xl mx-auto mb-8 italic shadow-2xl">Ω</div>
            <h2 class="text-[9px] font-black uppercase tracking-[0.5em] mb-10 text-zinc-500 italic">Global Sovereign v92.0</h2>
            <button onclick="voiceAuth()" class="w-full bg-zinc-900 border border-blue-900/30 py-4 rounded-2xl mb-4 text-[8px] font-black uppercase text-blue-500 italic">🎤 VoiceID Signature</button>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 text-center font-bold mb-6">
            <button onclick="unlock()" class="w-full bg-blue-600 py-6 rounded-[30px] font-black uppercase text-[10px] tracking-widest active:scale-95">Liberar Nexus Mundial</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-2xl h-full flex flex-col space-y-4 pt-4 overflow-hidden">
        <header class="flex justify-between items-center px-6">
            <div>
                <h1 class="font-black italic text-2xl uppercase tracking-tighter">Apex <span class="text-blue-500 underline">v92</span></h1>
                <p id="geo-status" class="text-[7px] text-zinc-500 font-black uppercase tracking-widest mt-1 italic">Detectando Coordenadas...</p>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="global-badge" id="norm-badge">Normas Internacionais</span>
                <div id="net-status" class="text-[6px] text-blue-500 font-black uppercase mt-1 italic">Sincronia Global Adaptativa</div>
            </div>
        </header>

        <section class="militar-panel p-8 space-y-4 flex-1 relative flex flex-col overflow-y-auto">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="neuralAI('TC')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-blue-400">🧠 TC/RX</button>
                <button onclick="neuralAI('ECG')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-red-400">⚡ ECG</button>
                <button onclick="neuralAI('LAB')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-yellow-500">💉 LAB</button>
                <button onclick="neuralAI('BABEL')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-purple-400">🌍 GLOBAL</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="age" placeholder="IDADE" class="p-4 text-center font-black text-lg">
                <input type="number" id="weight" placeholder="PESO" class="p-4 text-center font-black text-lg">
            </div>

            <textarea id="clin-in" class="w-full p-5 text-sm flex-1 outline-none resize-none font-medium" placeholder="Relato clínico para Processamento Global..."></textarea>

            <button onclick="processNomad()" class="w-full bg-white text-black py-6 rounded-[40px] font-black text-[12px] uppercase tracking-[0.3em] active:scale-95 shadow-2xl">Sincronizar Nexus Global</button>
            
            <div id="out" class="hidden bg-blue-950/10 border border-blue-900/20 p-6 rounded-[35px] text-[10px] leading-relaxed text-blue-100 italic"></div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                syncGlobalPosition();
                speak("Soberania v92 ativa. Acesso mundial liberado. Normas internacionais sincronizadas.");
            } else { alert("ACESSO NEGADO"); }
        }

        function syncGlobalPosition() {
            const geoStatus = document.getElementById('geo-status');
            const normBadge = document.getElementById('norm-badge');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    // Simulação de detecção regional
                    if (lat < 0) {
                        geoStatus.innerText = "LOCAL: HEMISFÉRIO SUL | DIRETRIZES: SBC/SBP/LATAM";
                        normBadge.innerText = "NORMAS SUL-AMERICANAS";
                    } else {
                        geoStatus.innerText = "LOCAL: HEMISFÉRIO NORTE | DIRETRIZES: AHA/ESC/UPTODATE";
                        normBadge.innerText = "NORMAS EURO-AMERICANAS";
                    }
                }, () => {
                    geoStatus.innerText = "LOCAL: DESCONHECIDO | DIRETRIZES: PADRÃO OURO MUNDIAL";
                });
            }
        }

        function processNomad() {
            const input = document.getElementById('clin-in').value.toLowerCase();
            let res = "[COGNICAO GLOBAL v92] Analisando via Harrison/Guyton e Normas Regionais. ";
            
            if(input.match(/iam|dor|peito/)) {
                res += "Protocolo de Emergência Cardiovascular Mundial. ";
                document.getElementById('nexus').classList.add('critical-alert');
            } else {
                document.getElementById('nexus').classList.remove('critical-alert');
            }

            const out = document.getElementById('out');
            out.innerText = res + " Processamento concluído sob soberania adaptativa.";
            out.classList.remove('hidden');
            speak(res);
            saveSecureLog(input, res);
        }

        function neuralAI(t) { speak(`Módulo ${t} em varredura global.`); processNomad(); }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 1.0; m.pitch = 0.85; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function voiceAuth() {
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { if(e.results[0][0].transcript.toLowerCase().includes("apex")) speak("Assinatura confirmada."); };
            r.start();
            speak("Identificação vocal necessária.");
        }

        function saveSecureLog(input, output) {
            const log = {
                t: new Date().toISOString(),
                protocol: "v92.0 Nomad",
                data: input,
                result: output,
                hash: btoa(Math.random().toString())
            };
            let history = JSON.parse(localStorage.getItem('apex_global_logs')) || [];
            history.push(log);
            localStorage.setItem('apex_global_logs', JSON.stringify(history.slice(-50)));
        }
    </script>
</body>
</html>
