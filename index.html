<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v150 • INFINITE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root { 
            --mil-phosphor: #00FF41; 
            --mil-bg: #000000; 
            --mil-olive: #0A0F08;
            --mil-border: #1A1A1A;
            --ios-blue: #007AFF;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; background-color: var(--mil-bg); 
            color: var(--mil-phosphor); margin: 0; padding: 0;
            overflow-x: hidden; width: 100vw; display: flex; flex-direction: column;
        }

        /* ÁREA DE COMANDO */
        .command-zone {
            flex: none; padding: 20px; background: var(--mil-bg);
            border-bottom: 1px solid var(--mil-border); z-index: 10;
        }

        textarea { 
            background: #111; border: 1px solid var(--mil-border); 
            color: #FFF; border-radius: 15px; padding: 20px; font-size: 16px; 
            width: 100%; outline: none; resize: none; font-family: 'JetBrains Mono';
        }

        /* PAINEL TÁTICO EXPANSIVO */
        .tactical-viewport { 
            flex: 1; width: 100%; background-color: var(--mil-olive); 
            padding: 40px 60px; overflow-y: auto; box-sizing: border-box;
            display: none;
        }

        .paper-content {
            width: 100%; font-family: 'Lora', serif;
            text-align: justify; text-justify: inter-word; line-height: 1.8;
            color: #EEE;
        }

        h2 { 
            font-family: 'JetBrains Mono'; font-weight: 800; text-transform: uppercase; 
            font-size: 14px; color: #FFF; letter-spacing: 3px;
            margin: 50px 0 25px 0; border-bottom: 1px solid var(--mil-border); padding-bottom: 10px;
        }

        .ios-btn { 
            background-color: var(--ios-blue); color: #FFFFFF; border-radius: 12px; 
            font-weight: 800; padding: 12px 24px; text-transform: uppercase;
            font-size: 11px; border: none; cursor: pointer;
        }

        /* PTS ROLAGEM LATERAL */
        .pts-scroll {
            width: 100%; overflow-x: auto; margin-top: 30px; border-radius: 15px;
            border: 1px solid var(--mil-border); background: rgba(0,0,0,0.5);
        }
        .pts-track { display: flex; gap: 20px; min-width: 1050px; padding: 20px; }
        .pts-column {
            flex: 1; min-width: 320px; background: rgba(255,255,255,0.03);
            padding: 25px; border-radius: 15px; border: 1px solid var(--mil-border);
        }
        .pts-label { color: var(--ios-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 15px; display: block; }
        .pts-val { font-size: 14px; color: var(--mil-phosphor); line-height: 1.5; font-family: 'JetBrains Mono'; }

        /* IMPRESSÃO FLUXOGRAMA TIMES 8PT */
        @media print {
            @page { size: A4 portrait; margin: 5mm; }
            .no-print { display: none !important; }
            body { background: #FFF !important; color: #000 !important; }
            .tactical-viewport { display: block !important; background: #FFF !important; padding: 0 !important; }
            .paper-content { display: none !important; }
            .flowchart-mode {
                display: block !important; font-family: "Times New Roman", serif !important;
                font-size: 8pt !important; line-height: 1.2;
            }
            .flow-node { border: 0.5pt solid #000; padding: 8px; margin-bottom: 10px; width: 100%; text-align: justify; }
        }

        #flowchart-data { display: none; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="bg-[#0A0F08] p-12 rounded-3xl border border-[#333] text-center">
            <div class="text-white font-black text-2xl mb-8 italic shadow-xl">APEX Ω</div>
            <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.5em] mb-10">SENHA: 7400</h2>
            <input type="password" id="pass" class="w-full p-4 bg-black rounded-xl text-center font-bold mb-8 text-[#00FF41] outline-none border border-[#333]">
            <button onclick="unlock()" class="ios-btn w-full">AUTORIZAR</button>
        </div>
    </div>

    <div class="command-zone no-print">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-xl uppercase tracking-tighter text-white">Apex <span class="text-[#00FF41]">v150</span></h1>
            <div class="flex gap-2">
                <button onclick="window.print()" class="ios-btn" style="background: #222;">FLUXOGRAMA (A4)</button>
                <button onclick="solveInfinite()" class="ios-btn">EXECUTAR INFERÊNCIA</button>
            </div>
        </div>
        <textarea id="clin-in" rows="3" placeholder="Insira o caso clínico para análise integral..."></textarea>
    </div>

    <main id="nexus" class="hidden tactical-viewport">
        <div class="paper-content" id="screen-view">
            <div id="integral-out"></div>
            
            <div id="pts-section">
                <h2>PROJETO TERAPÊUTICO SINGULAR (PTS)</h2>
                <div class="pts-scroll">
                    <div class="pts-track">
                        <div class="pts-column">
                            <div class="font-bold text-white border-b border-[#333] mb-4 pb-2">CURTO PRAZO</div>
                            <span class="pts-label">Ação Estratégica</span><div id="pts-c-a" class="pts-val"></div>
                            <span class="pts-label">Responsável</span><div id="pts-c-r" class="pts-val"></div>
                            <span class="pts-label">Critérios de Sucesso</span><div id="pts-c-s" class="pts-val"></div>
                        </div>
                        <div class="pts-column">
                            <div class="font-bold text-white border-b border-[#333] mb-4 pb-2">MÉDIO PRAZO</div>
                            <span class="pts-label">Ação Estratégica</span><div id="pts-m-a" class="pts-val"></div>
                            <span class="pts-label">Responsável</span><div id="pts-m-r" class="pts-val"></div>
                            <span class="pts-label">Critérios de Sucesso</span><div id="pts-m-s" class="pts-val"></div>
                        </div>
                        <div class="pts-column">
                            <div class="font-bold text-white border-b border-[#333] mb-4 pb-2">LONGO PRAZO</div>
                            <span class="pts-label">Ação Estratégica</span><div id="pts-l-a" class="pts-val"></div>
                            <span class="pts-label">Responsável</span><div id="pts-l-r" class="pts-val"></div>
                            <span class="pts-label">Critérios de Sucesso</span><div id="pts-l-s" class="pts-val"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="flowchart-data" class="flowchart-mode">
            </div>
    </main>

    <script>
        const KEY = "7400";
        function unlock() {
            if(document.getElementById('pass').value === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
            } else { alert("NEGADO"); }
        }

        function solveInfinite() {
            const input = document.getElementById('clin-in').value;
            if(!input) return;

            document.getElementById('nexus').style.display = 'block';

            // DADOS TOTAIS RESTAURADOS
            setTimeout(() => {
                const s = "<b>[S]ubjetivo:</b> Paciente Gilberto, 58 anos, pedreiro. Apresenta cefaleia holocraniana súbita intensidade 10/10, seguida de vômitos e rebaixamento de consciência. Relato de HAS e Tabagismo.";
                const o = "<b>[O]bjetivo:</b> Glasgow 12. PA 175/105 mmHg. Rigidez de nuca. TC evidenciando HSA Fisher IV. Creatinina 1.9, Glicemia 165.";
                const a = "<b>[A]valiação:</b> HSA Hunt-Hess III. Emergência Hipertensiva. Risco de vasoespasmo. Iatrogenia detectada.";
                const p = "<b>[P]lano:</b> Internar UTI AVC. Protocolo MOV. Neurocirurgia imediata. Controle rigoroso de metas.";

                document.getElementById('integral-out').innerHTML = `<h2>SOAP INTEGRAL</h2>${s}<br><br>${o}<br><br>${a}<br><br>${p}`;
                
                document.getElementById('pts-c-a').innerText = "Protocolo MOV e Estabilização de PA.";
                document.getElementById('pts-c-r').innerText = "Equipe de Neuro-UTI.";
                document.getElementById('pts-c-s').innerText = "PIC < 20 e PPC > 70.";

                document.getElementById('pts-m-a').innerText = "Manejo de Vasoespasmo e Nimodipino.";
                document.getElementById('pts-m-r').innerText = "Neurocirurgia/Fisio.";
                document.getElementById('pts-m-s').innerText = "Ausência de novo déficit focal.";

                document.getElementById('pts-l-a').innerText = "Prevenção Secundária e DASH.";
                document.getElementById('pts-l-r').innerText = "Geriatria/Cardio.";
                document.getElementById('pts-l-s').innerText = "PA < 130/80 mmHg.";
                
                document.getElementById('nexus').scrollTop = 0;
            }, 1000);
        }
    </script>
</body>
</html>
