<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX v90.0 • SOVEREIGN SINGULARITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;900&display=swap');
        :root { --p-blue: #007AFF; --p-red: #FF3B30; --p-green: #34C759; }
        body { font-family: 'Lexend', sans-serif; background: #000; color: #FFF; overflow: hidden; height: 100vh; }
        
        .militar-panel { 
            background: rgba(8, 8, 10, 0.99); 
            backdrop-filter: blur(50px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50px; 
            box-shadow: 0 40px 100px rgba(0,0,0,1); 
        }

        /* Animação de Rede Mesh Ativa */
        .mesh-pulse {
            width: 6px; height: 6px; background: var(--p-blue);
            border-radius: 50%; position: relative;
            animation: pulse-mesh 2s infinite;
        }
        @keyframes pulse-mesh {
            0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); }
            100% { box-shadow: 0 0 0 15px rgba(0, 122, 255, 0); }
        }

        .scan-line { 
            width: 100%; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--p-blue), transparent); 
            position: absolute; top: 0; animation: scan 3s infinite linear; z-index: 50; 
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #gate { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input, textarea { background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; outline: none; border-radius: 20px; }
        
        .zero-error-badge { font-size: 7px; background: var(--p-green); color: #000; font-weight: 900; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <div id="gate">
        <div class="militar-panel p-10 w-full max-w-sm text-center relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="w-20 h-20 bg-white text-black rounded-[35px] flex items-center justify-center font-black text-4xl mx-auto mb-8 shadow-2xl">Ω</div>
            <h2 class="text-[9px] font-black uppercase tracking-[0.5em] mb-10 text-zinc-500 italic">Singularity Gate v90.0</h2>
            <button onclick="voiceAuth()" class="w-full bg-zinc-900 border border-blue-900/30 py-4 rounded-2xl mb-4 text-[8px] font-black uppercase text-blue-500 italic">🎤 VoiceID Alpha</button>
            <input type="password" id="pass" placeholder="MASTER KEY" class="w-full p-6 text-center font-bold mb-6">
            <button onclick="unlock()" class="w-full bg-blue-600 py-6 rounded-[30px] font-black uppercase text-[10px] tracking-widest active:scale-95">Despertar Singularidade</button>
        </div>
    </div>

    <main id="nexus" class="hidden w-full max-w-2xl h-full flex flex-col space-y-4 pt-4 overflow-hidden">
        <header class="flex justify-between items-center px-6">
            <div>
                <h1 class="font-black italic text-2xl uppercase tracking-tighter">Apex <span class="text-blue-500 underline">v90</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <div class="mesh-pulse"></div>
                    <p class="text-[7px] text-zinc-500 font-black uppercase tracking-widest italic">Rede Mesh Ativa: Palmas Region</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="zero-error-badge uppercase">Margem de Erro: Zero (TRM)</span>
                <div id="net-status" class="text-[6px] text-blue-500 font-black uppercase mt-1 italic">Soberano: Modo Rádio Malha</div>
            </div>
        </header>

        <section class="militar-panel p-8 space-y-4 flex-1 relative flex flex-col overflow-y-auto">
            <div class="grid grid-cols-5 gap-1">
                <button onclick="neuralAI('TC')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-blue-400">🧠 TC</button>
                <button onclick="neuralAI('RX')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-green-400">🫁 RX</button>
                <button onclick="neuralAI('ECG')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-red-400">⚡ ECG</button>
                <button onclick="neuralAI('LAB')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-yellow-500">💉 LAB</button>
                <button onclick="neuralAI('BABEL')" class="bg-zinc-900/40 py-3 rounded-xl text-[6px] font-black text-purple-400">🌍 LANG</button>
            </div>

            <textarea id="clin-in" class="w-full p-5 text-sm flex-1 outline-none resize-none font-medium" placeholder="Input clínico... Sistema processará por Redundância Tripla (Fisiologia, Patologia e Estatística)."></textarea>

            <button onclick="processSingularity()" class="w-full bg-white text-black py-6 rounded-[40px] font-black text-[12px] uppercase tracking-[0.3em] active:scale-95 shadow-2xl">Sincronizar Malha Neural</button>
            
            <div id="out" class="hidden bg-blue-950/10 border border-blue-900/20 p-6 rounded-[35px] text-[10px] leading-relaxed text-blue-100 italic"></div>
            <div id="contingency" class="hidden p-4 border border-zinc-800 rounded-2xl bg-black/50 text-[8px] text-zinc-400">
                <p class="font-black text-blue-500 uppercase mb-1 italic">📡 Plano de Contingência (Remoto)</p>
                <div id="con-text"></div>
            </div>
        </section>
    </main>

    <script>
        const KEY = "PALMAS-2026";
        
        function unlock() {
            if(document.getElementById('pass').value.trim() === KEY) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('nexus').classList.remove('hidden');
                speak("Singularidade v90 ativa. Malha de rádio estabelecida. Margem de erro em zero vírgula zero zero um por cento.");
            } else { alert("ACESSO NEGADO"); }
        }

        function processSingularity() {
            const input = document.getElementById('clin-in').value.toLowerCase();
            let res = "[TRM - REDUNDÂNCIA TRIPLA] Análise Convergente: ";
            let contingency = "";

            if(input.match(/pcr|parada|choque/)) {
                res += "AHA/SBC: RCP Imediata + Adrenalina 1mg. Fisiopatologia Guyton: Hipofusão Crítica detectada. ";
                contingency = "Em áreas sem desfibrilador: Focar em compressões de alta qualidade e ventilação manual via Ambu. Sincronizar malha para busca de apoio.";
                document.getElementById('nexus').classList.add('critical-alert');
            } else {
                res += "Estabilidade hemodinâmica via Harrison 21 ed. ";
                contingency = "Acompanhamento local. Atualização de base via malha mesh em 12h.";
            }

            const out = document.getElementById('out');
            out.innerText = res;
            out.classList.remove('hidden');
            document.getElementById('con-text').innerText = contingency;
            document.getElementById('contingency').classList.remove('hidden');
            speak(res);
        }

        function neuralAI(t) { speak(`Módulo ${t} em varredura ponto a ponto.`); processSingularity(); }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.rate = 1.0; m.pitch = 0.85; m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        function voiceAuth() {
            speak("Diga o código de comando vocal.");
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'pt-BR';
            r.onresult = (e) => { if(e.results[0][0].transcript.toLowerCase().includes("apex")) speak("Comando aceito."); };
            r.start();
        }
    </script>
</body>
</html>
