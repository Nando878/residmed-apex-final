<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>APEX v175 • EDGE CATALYST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        body { background: #000; color: #FFF; font-family: 'JetBrains Mono', monospace; margin: 0; }
        .zone { position: sticky; top: 0; padding: 25px; background: rgba(0,0,0,0.98); border-bottom: 2px solid #1A1A1A; z-index: 100; backdrop-filter: blur(15px); }
        textarea { background: #080808; border: 1px solid #333; color: #00FF41 !important; border-radius: 12px; padding: 20px; width: 100%; outline: none; font-size: 16px; transition: 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,1); }
        textarea:focus { border-color: #00FF41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .viewport { padding: 40px 80px; display: none; }
        .paper-content { font-family: 'Lora', serif; text-align: justify; line-height: 2; font-size: 18px; color: #F0F0F0; }
        h2 { color: #00FF41; border-bottom: 2px solid #1A1A1A; padding-bottom: 15px; text-transform: uppercase; font-size: 14px; letter-spacing: 4px; margin-top: 60px; }
        .soap-card { background: linear-gradient(145deg, #0a0a0a, #111); padding: 30px; border-radius: 20px; border: 1px solid #1A1A1A; margin-bottom: 30px; border-left: 5px solid #00FF41; }
        .btn-exec { background: #00FF41; color: #000; font-weight: 800; padding: 15px; border-radius: 10px; width: 100%; margin-top: 15px; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-exec:hover { background: #FFF; box-shadow: 0 0 30px #00FF41; }
    </style>
</head>
<body>

<div class="zone">
    <div class="flex justify-between items-center mb-4">
        <h1 class="font-black italic text-2xl uppercase tracking-widest text-white">Apex <span class="text-[#00FF41]">v175</span></h1>
        <div id="status-tag" class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">System Online • Edge Stable</div>
    </div>
    <textarea id="in" rows="3" placeholder="Insira o quadro clínico completo..."></textarea>
    <button id="triggerBtn" class="btn-exec">Disparar Análise Soberana</button>
</div>

<main id="nexus" class="viewport">
    <div class="paper-content" id="output"></div>
</main>

<script>
    const API_KEY = 'AIzaSyBCWOXSosudmIfZ4qDsWK-8Ze7EbqnfZNQ';
    const inputArea = document.getElementById('in');
    const btn = document.getElementById('triggerBtn');

    // FIX PARA EDGE: Escuta global de teclado
    inputArea.addEventListener('keypress', function(e) {
        if (e.which === 13 && !e.shiftKey) {
            e.preventDefault();
            executeSovereignAI();
        }
    });

    btn.addEventListener('click', executeSovereignAI);

    async function executeSovereignAI() {
        const textInput = inputArea.value;
        const status = document.getElementById('status-tag');
        if (!textInput) return;

        status.innerText = "SINCRO-SINAPSE EM CURSO...";
        status.style.color = "#FF0000";
        document.getElementById('nexus').style.display = "none";

        const sovereignPrompt = `Aja como um preceptor sênior da HCFMUSP e estrategista médico. 
        Analise o caso com PROFUNDIDADE EXAUSTIVA.
        
        ESTRUTURA EXIGIDA:
        1. [S]ubjetivo: Histórico detalhado, anamnese dirigida e fatores de risco.
        2. [O]bjetivo: Exame físico pormenorizado, análise de sinais vitais e interpretação fisiopatológica de exames laboratoriais/imagem.
        3. [A]valiação: Raciocínio clínico complexo, diagnósticos diferenciais fundamentados e estratificação de gravidade (classificações atualizadas 2026).
        4. [P]lano: Conduta terapêutica completa, doses, metas e justificativas para cada intervenção.
        5. PTS (3 FASES): Curto, Médio e Longo Prazo.

        CASO: ${textInput}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: sovereignPrompt }] }],
                    safetySettings: [{ category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                alert("ERRO TÉCNICO: " + data.error.message);
                return;
            }

            const rawResponse = data.candidates[0].content.parts[0].text;
            renderSovereign(rawResponse);
            
            status.innerText = "SYSTEM ONLINE • EDGE STABLE";
            status.style.color = "#00FF41";

        } catch (err) {
            alert("ALERTA: O Edge bloqueou a conexão ou a API expirou. Tente rodar o arquivo localmente.");
            console.error(err);
        }
    }

    function renderSovereign(text) {
        document.getElementById('nexus').style.display = 'block';
        const formatted = text
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/### (.*?)(<br>|$)/g, '<h2>$1</h2>')
            .replace(/\[S\]/g, '<div class="soap-card"><b>[S]ubjetivo</b>')
            .replace(/\[O\]/g, '</div><div class="soap-card"><b>[O]bjetivo</b>')
            .replace(/\[A\]/g, '</div><div class="soap-card"><b>[A]valiação</b>')
            .replace(/\[P\]/g, '</div><div class="soap-card"><b>[P]lano</b>')
            .concat('</div>');
            
        document.getElementById('output').innerHTML = formatted;
        window.scrollTo({top: 0, behavior: 'smooth'});
        inputArea.blur();
    }
</script>
</body>
</html>
